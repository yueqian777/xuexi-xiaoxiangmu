    const frame = document.getElementById('frame');
    const readerGrid = document.getElementById('readerGrid');
    const deckTitle = document.getElementById('deckTitle');
    const deckMeta = document.getElementById('deckMeta');
    const pageRoot = document.getElementById('pages');
    const noteRoot = document.getElementById('notes');
    const pageJumpInput = document.getElementById('pageJumpInput');
    const pageJumpTotal = document.getElementById('pageJumpTotal');
    const sectionSelect = document.getElementById('sectionSelect');
    const fullscreenButton = document.getElementById('fullscreenButton');
    const selectionToolbar = document.getElementById('selectionToolbar');
    const askSelectionButton = document.getElementById('askSelectionButton');
    const highlightSelectionButton = document.getElementById('highlightSelectionButton');
    const copySelectionButton = document.getElementById('copySelectionButton');
    const selectionHint = document.getElementById('selectionHint');
    const canvasChat = document.getElementById('canvasChat');
    const toggleCanvasButton = document.getElementById('toggleCanvasButton');
    const openCanvasButton = document.getElementById('openCanvasButton');
    const canvasChatMeta = document.getElementById('canvasChatMeta');
    const canvasContext = document.getElementById('canvasContext');
    const canvasMessages = document.getElementById('canvasMessages');
    const canvasInput = document.getElementById('canvasInput');
    const canvasSendButton = document.getElementById('canvasSendButton');
    const canvasHint = document.getElementById('canvasHint');
    const quotePreview = document.getElementById('quotePreview');
    const quotePreviewText = document.getElementById('quotePreviewText');
    const clearQuoteButton = document.getElementById('clearQuoteButton');

    let pages = [];
    let sections = [];
    let deckId = 0;
    let activeModel = '';
    let observer = null;
    let currentSelectionPayload = null;
    let currentSlideNumber = 1;
    let currentChatQuote = null;
    let restoreScrollAfterRender = null;
    let layoutState = { pages: 1.15, notes: 0.85, chat: 0.55 };
    let chatCollapsed = false;
    let activeResize = null;
    let readingMode = 'paged';
    let pageWheelDelta = 0;
    let lastPageSwitchAt = 0;
    let scrollStateSaveTimer = null;
    let viewportAnchorTimers = [];
    let suppressObserverUntil = 0;
    let viewportAnchorState = null;
    let viewportAnchorReleaseTimer = null;
    let hasCenteredOnEntry = false;
    let parentCenterTimer = null;
    let lastFullscreenState = false;
    let readerStructureSignature = '';
    let positionNotifyTimer = null;
    let lastPositionNotifyKey = '';
    let nearbyContentTimer = null;
    let pendingNearbySlideNumber = null;
    let typesetFlushTimer = null;
    let mathJaxRetryTimer = null;
    let typesetChain = Promise.resolve();
    const pendingTypesetTargets = new Set();
    const hydratingNotePromises = new Map();
    const pendingExplanationSaves = new Map();
    const PENDING_SAVE_TTL_MS = 30000;
    const VIEWPORT_ANCHOR_MS = 1400;
    const NOTE_HYDRATE_RADIUS = 1;
    const TYPESET_BATCH_DELAY_MS = 40;
    const MATHJAX_RETRY_MS = 180;
    const NEARBY_CONTENT_IDLE_MS = 90;
    const IMAGE_WINDOW_NOTIFY_IDLE_MS = 420;

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function findUnescaped(source, token, start) {
      let index = start;
      while (index < source.length) {
        const found = source.indexOf(token, index);
        if (found < 0) return -1;
        let slashCount = 0;
        for (let i = found - 1; i >= 0 && source[i] === '\\'; i -= 1) {
          slashCount += 1;
        }
        if (slashCount % 2 === 0) return found;
        index = found + token.length;
      }
      return -1;
    }

    function isAsciiWordLike(char) {
      return /[A-Za-z0-9_$]/.test(String(char || ''));
    }

    function isLikelyEqualityOperator(source, index) {
      if (!source.startsWith('==', index)) return false;
      const before = source[index - 1] || '';
      const after = source[index + 2] || '';
      if (/\s/.test(before) && /\s/.test(after)) return true;
      return isAsciiWordLike(before) && isAsciiWordLike(after);
    }

    function findHighlightDelimiter(source, start) {
      let index = start;
      while (index < source.length) {
        const found = findUnescaped(source, '==', index);
        if (found < 0) return -1;
        if (!isLikelyEqualityOperator(source, found)) return found;
        index = found + 2;
      }
      return -1;
    }

    function normalizeMathDelimiters(value) {
      return String(value ?? '').replace(/\\\\([()[\]])/g, '\\$1');
    }

    function protectMarkdownCodeSegments(value) {
      const source = String(value ?? '');
      const segments = [];
      let protectedSource = '';
      let index = 0;
      const pushSegment = (endIndex, segment) => {
        const token = `MARKDOWNCODEPLACEHOLDER${segments.length}TOKEN`;
        segments.push({ token, segment });
        protectedSource += token;
        index = endIndex;
      };

      scan:
      while (index < source.length) {
        if (source.startsWith('```', index) || source.startsWith('~~~', index)) {
          const fence = source.slice(index, index + 3);
          const firstLineEnd = source.indexOf('\n', index + 3);
          if (firstLineEnd >= 0) {
            let searchFrom = firstLineEnd + 1;
            while (searchFrom < source.length) {
              const close = source.indexOf(fence, searchFrom);
              if (close < 0) break;
              if (close === 0 || source[close - 1] === '\n') {
                const closeLineEnd = source.indexOf('\n', close + fence.length);
                const endIndex = closeLineEnd >= 0 ? closeLineEnd + 1 : close + fence.length;
                pushSegment(endIndex, source.slice(index, endIndex));
                continue scan;
              }
              searchFrom = close + fence.length;
            }
          }
        }

        if (source[index] === '`') {
          let tickEnd = index;
          while (source[tickEnd] === '`') tickEnd += 1;
          const tickCount = tickEnd - index;
          if (tickCount < 3) {
            const fence = '`'.repeat(tickCount);
            const end = source.indexOf(fence, tickEnd);
            if (end >= 0) {
              pushSegment(end + tickCount, source.slice(index, end + tickCount));
              continue;
            }
          }
        }

        protectedSource += source[index];
        index += 1;
      }

      return { protectedSource, segments };
    }

    function restoreMarkdownCodeSegments(value, segments) {
      let output = String(value ?? '');
      segments.forEach(({ token, segment }) => {
        output = output.replaceAll(token, segment);
      });
      return output;
    }

    function protectMathSegments(value) {
      const source = normalizeMathDelimiters(value);
      const segments = [];
      let protectedSource = '';
      let index = 0;
      const pushSegment = (endIndex, segment) => {
        const token = `MATHJAXPLACEHOLDER${segments.length}TOKEN`;
        segments.push({ token, segment });
        protectedSource += token;
        index = endIndex;
      };

      while (index < source.length) {
        if (source.startsWith('$$', index)) {
          const end = findUnescaped(source, '$$', index + 2);
          if (end >= 0) {
            pushSegment(end + 2, `\\[${source.slice(index + 2, end)}\\]`);
            continue;
          }
        }
        if (source.startsWith('\\[', index)) {
          const end = findUnescaped(source, '\\]', index + 2);
          if (end >= 0) {
            pushSegment(end + 2, source.slice(index, end + 2));
            continue;
          }
        }
        if (source.startsWith('\\(', index)) {
          const end = findUnescaped(source, '\\)', index + 2);
          if (end >= 0) {
            pushSegment(end + 2, source.slice(index, end + 2));
            continue;
          }
        }
        if (source[index] === '$' && source[index + 1] !== '$') {
          const end = findUnescaped(source, '$', index + 1);
          if (end >= 0) {
            pushSegment(end + 1, `\\(${source.slice(index + 1, end)}\\)`);
            continue;
          }
        }
        protectedSource += source[index];
        index += 1;
      }
      return { protectedSource, segments };
    }

    function restoreMathSegments(value, segments) {
      let html = String(value ?? '');
      segments.forEach(({ token, segment }) => {
        const mathText = escapeHtml(segment);
        html = html.replaceAll(new RegExp(`<code>\\s*${token}\\s*</code>`, 'g'), mathText);
        html = html.replaceAll(token, mathText);
      });
      return html;
    }

    function protectHighlightSegments(value) {
      const source = String(value ?? '');
      const segments = [];
      let protectedSource = '';
      let index = 0;
      while (index < source.length) {
        if (source.startsWith('==', index) && !isLikelyEqualityOperator(source, index)) {
          const end = findHighlightDelimiter(source, index + 2);
          if (end >= 0) {
            const token = `HIGHLIGHTPLACEHOLDER${segments.length}TOKEN`;
            segments.push({ token, segment: source.slice(index + 2, end) });
            protectedSource += token;
            index = end + 2;
            continue;
          }
        }
        protectedSource += source[index];
        index += 1;
      }
      return { protectedSource, segments };
    }

    function restoreHighlightSegments(value, segments) {
      let html = String(value ?? '');
      segments.forEach(({ token, segment }) => {
        html = html.replaceAll(token, `<mark class="reader-highlight">${escapeHtml(segment)}</mark>`);
      });
      return html;
    }

    function renderFallbackCodeSegment(segment) {
      const source = String(segment ?? '');
      if (source.startsWith('```') || source.startsWith('~~~')) {
        const fence = source.slice(0, 3);
        const firstLineEnd = source.indexOf('\n');
        const info = firstLineEnd >= 0 ? source.slice(3, firstLineEnd).trim() : '';
        const language = (info.split(/\s+/)[0] || '').replace(/[^\w-]/g, '');
        const codeStart = firstLineEnd >= 0 ? firstLineEnd + 1 : 3;
        let codeEnd = source.lastIndexOf(`\n${fence}`);
        if (codeEnd < codeStart) {
          codeEnd = source.endsWith(fence) ? source.length - fence.length : source.length;
        }
        const code = source.slice(codeStart, codeEnd);
        const languageClass = language ? ` class="language-${escapeHtml(language)}"` : '';
        return `<pre><code${languageClass}>${escapeHtml(code)}</code></pre>`;
      }

      if (source.startsWith('`')) {
        let tickCount = 0;
        while (source[tickCount] === '`') tickCount += 1;
        return `<code>${escapeHtml(source.slice(tickCount, source.length - tickCount))}</code>`;
      }

      return escapeHtml(source);
    }

    function renderFallbackMarkdown(value) {
      const codeProtected = protectMarkdownCodeSegments(value);
      let html = escapeHtml(codeProtected.protectedSource).replaceAll('\n', '<br>');
      codeProtected.segments.forEach(({ token, segment }) => {
        html = html.replaceAll(token, renderFallbackCodeSegment(segment));
      });
      return html;
    }

    function renderMarkdown(value) {
      const source = String(value ?? '');
      const codeProtected = protectMarkdownCodeSegments(source);
      const mathProtected = protectMathSegments(codeProtected.protectedSource);
      const highlightProtected = protectHighlightSegments(mathProtected.protectedSource);
      const markdownSource = restoreMarkdownCodeSegments(
        highlightProtected.protectedSource,
        codeProtected.segments
      );
      if (!window.marked || !window.DOMPurify) {
        return restoreMathSegments(
          restoreHighlightSegments(renderFallbackMarkdown(markdownSource), highlightProtected.segments),
          mathProtected.segments
        );
      }
      const rawHtml = window.marked.parse(markdownSource, {
        gfm: true,
        breaks: true,
      });
      const sanitized = window.DOMPurify.sanitize(rawHtml, {
        USE_PROFILES: { html: true },
      });
      return restoreMathSegments(
        restoreHighlightSegments(sanitized, highlightProtected.segments),
        mathProtected.segments
      );
    }

    function connectedTypesetTargets(targets) {
      const seen = new Set();
      return (Array.isArray(targets) ? targets : [targets])
        .filter(target => {
          if (!target || seen.has(target)) return false;
          if (target.isConnected === false) return false;
          if (
            typeof document !== 'undefined'
            && target.nodeType
            && document.contains
            && !document.contains(target)
          ) {
            return false;
          }
          seen.add(target);
          return true;
        });
    }

    function scheduleMathJaxRetry() {
      if (mathJaxRetryTimer) return;
      mathJaxRetryTimer = window.setTimeout(() => {
        mathJaxRetryTimer = null;
        if (pendingTypesetTargets.size) flushTypesetQueue();
      }, MATHJAX_RETRY_MS);
    }

    function flushTypesetQueue() {
      if (typesetFlushTimer) {
        window.clearTimeout(typesetFlushTimer);
        typesetFlushTimer = null;
      }
      const targets = connectedTypesetTargets(Array.from(pendingTypesetTargets));
      pendingTypesetTargets.clear();
      if (!targets.length) return Promise.resolve(false);
      if (!window.MathJax?.typesetPromise) {
        targets.forEach(target => pendingTypesetTargets.add(target));
        scheduleMathJaxRetry();
        return Promise.resolve(false);
      }
      typesetChain = typesetChain
        .catch(error => {
          console.error(error);
          return false;
        })
        .then(() => {
          const freshTargets = connectedTypesetTargets(targets);
          if (!freshTargets.length) return false;
          try {
            window.MathJax.typesetClear?.(freshTargets);
          } catch (error) {
            console.error(error);
          }
          return window.MathJax.typesetPromise(freshTargets)
            .then(() => true)
            .catch(error => {
              console.error(error);
              return false;
            });
        });
      return typesetChain;
    }

    function typesetTargets(targets) {
      const freshTargets = connectedTypesetTargets(targets);
      if (!freshTargets.length) return Promise.resolve(false);
      freshTargets.forEach(target => pendingTypesetTargets.add(target));
      if (!window.MathJax?.typesetPromise) {
        scheduleMathJaxRetry();
        return Promise.resolve(false);
      }
      if (!typesetFlushTimer) {
        typesetFlushTimer = window.setTimeout(flushTypesetQueue, TYPESET_BATCH_DELAY_MS);
      }
      return typesetChain;
    }

    function typesetMath() {
      return typesetTargets([noteRoot, canvasMessages]);
    }

    function storageKey(name) {
      return `intp_synced_reader_${deckId}_${name}`;
    }

    function globalStorageKey(name) {
      return `intp_synced_reader_global_${name}`;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function parentScrollContext() {
      try {
        const parentWindow = window.parent;
        if (!parentWindow || parentWindow === window) return null;
        const frameElement = window.frameElement;
        const parentDocument = parentWindow.document;
        if (!frameElement || !parentDocument) return null;
        const scrollingElement = parentDocument.scrollingElement || parentDocument.documentElement || parentDocument.body;
        const candidates = [
          scrollingElement,
          parentDocument.documentElement,
          parentDocument.body,
          ...parentDocument.querySelectorAll('[data-testid="stAppViewContainer"], [data-testid="stMain"], section.main, .main'),
        ].filter(Boolean);
        const scrollElement = candidates.find(element => (
          element.clientHeight > 0 && element.scrollHeight > element.clientHeight + 24
        )) || scrollingElement;
        if (!scrollElement) return null;
        const useWindow = scrollElement === scrollingElement
          || scrollElement === parentDocument.documentElement
          || scrollElement === parentDocument.body;
        return { parentWindow, parentDocument, frameElement, scrollElement, useWindow };
      } catch (error) {
        return null;
      }
    }

    function parentViewportHeight(context) {
      if (context.useWindow) {
        return context.parentWindow.innerHeight || context.scrollElement.clientHeight || 0;
      }
      return context.scrollElement.clientHeight || 0;
    }

    function parentScrollTop(context) {
      if (context.useWindow) {
        return context.parentWindow.scrollY
          || context.parentWindow.pageYOffset
          || context.scrollElement.scrollTop
          || 0;
      }
      return context.scrollElement.scrollTop || 0;
    }

    function parentMaxScrollTop(context, viewportHeight) {
      const maxHeight = Math.max(
        context.scrollElement.scrollHeight || 0,
        context.parentDocument.documentElement?.scrollHeight || 0,
        context.parentDocument.body?.scrollHeight || 0
      );
      return Math.max(0, maxHeight - viewportHeight);
    }

    function centerReaderInParent(options = {}) {
      const context = parentScrollContext();
      if (!context) return false;
      const frameRect = context.frameElement.getBoundingClientRect();
      const viewportHeight = parentViewportHeight(context);
      if (!viewportHeight || !frameRect.height) return false;
      if (options.skipIfAboveViewport && frameRect.bottom < 24) return false;

      const scrollTop = parentScrollTop(context);
      const containerTop = context.useWindow ? 0 : context.scrollElement.getBoundingClientRect().top;
      const relativeTop = frameRect.top - containerTop;
      const targetTop = clamp(
        scrollTop + relativeTop + (frameRect.height / 2) - (viewportHeight / 2),
        0,
        parentMaxScrollTop(context, viewportHeight)
      );
      if (Math.abs(scrollTop - targetTop) < 6) return true;

      const behavior = options.behavior || 'auto';
      if (context.useWindow) {
        context.parentWindow.scrollTo({ top: targetTop, behavior });
      } else {
        context.scrollElement.scrollTo({ top: targetTop, behavior });
      }
      return true;
    }

    function scheduleParentReaderCenter(options = {}) {
      window.clearTimeout(parentCenterTimer);
      parentCenterTimer = window.setTimeout(() => {
        window.requestAnimationFrame(() => centerReaderInParent(options));
      }, Number(options.delay || 120));
    }

    function loadLayoutState() {
      try {
        const saved = JSON.parse(localStorage.getItem(globalStorageKey('layout')) || '{}');
        if (Number.isFinite(saved.pages) && Number.isFinite(saved.notes) && Number.isFinite(saved.chat)) {
          layoutState = {
            pages: clamp(saved.pages, 0.35, 3.2),
            notes: clamp(saved.notes, 0.35, 3.2),
            chat: clamp(saved.chat, 0.28, 2.4),
          };
        }
        chatCollapsed = localStorage.getItem(globalStorageKey('chatCollapsed')) === 'true';
      } catch {
        layoutState = { pages: 1.15, notes: 0.85, chat: 0.55 };
        chatCollapsed = false;
      }
      applyLayoutState();
    }

    function saveLayoutState() {
      localStorage.setItem(globalStorageKey('layout'), JSON.stringify(layoutState));
      localStorage.setItem(globalStorageKey('chatCollapsed'), String(chatCollapsed));
    }

    function loadReadingMode() {
      const saved = localStorage.getItem(globalStorageKey('readingMode'));
      readingMode = saved === 'continuous' ? 'continuous' : 'paged';
      applyReadingMode();
    }

    function saveReadingMode() {
      localStorage.setItem(globalStorageKey('readingMode'), readingMode);
    }

    function applyReadingMode() {
      pageRoot.classList.toggle('paged', readingMode === 'paged');
      document.querySelectorAll('[data-reading-mode]').forEach(button => {
        button.classList.toggle('active', button.dataset.readingMode === readingMode);
      });
      if (readingMode === 'paged' && pages.length) {
        window.setTimeout(() => centerPage(currentSlideNumber, 'auto'), 40);
      }
    }

    function setReadingMode(mode) {
      readingMode = mode === 'continuous' ? 'continuous' : 'paged';
      applyReadingMode();
      saveReadingMode();
      if (readingMode === 'paged') {
        centerPage(currentSlideNumber, 'smooth');
      }
    }

    function applyLayoutState() {
      if (!readerGrid) return;
      const chatColumn = chatCollapsed ? '48px' : `minmax(330px, ${layoutState.chat}fr)`;
      readerGrid.style.gridTemplateColumns = `minmax(260px, ${layoutState.pages}fr) 8px minmax(300px, ${layoutState.notes}fr) 8px ${chatColumn}`;
      canvasChat.classList.toggle('collapsed', chatCollapsed);
      if (toggleCanvasButton) toggleCanvasButton.textContent = chatCollapsed ? '展开' : '收起';
    }

    function setLayoutPreset(name) {
      const presets = {
        balanced: { pages: 1, notes: 1, chat: 0.72 },
        reading: { pages: 1.55, notes: 0.82, chat: 0.5 },
        notes: { pages: 0.86, notes: 1.45, chat: 0.56 },
        chat: { pages: 0.85, notes: 0.82, chat: 1.05 },
      };
      layoutState = presets[name] || presets.balanced;
      if (name === 'chat') chatCollapsed = false;
      applyLayoutState();
      saveLayoutState();
    }

    function openCanvasChat(focusInput = false) {
      if (chatCollapsed) {
        chatCollapsed = false;
        applyLayoutState();
        saveLayoutState();
      }
      if (focusInput) {
        window.setTimeout(() => canvasInput?.focus(), 80);
      }
    }

    function toggleCanvasChat() {
      chatCollapsed = !chatCollapsed;
      applyLayoutState();
      saveLayoutState();
    }

    function syncFullscreenState(isFullscreen) {
      document.body.classList.toggle('reader-fullscreen', isFullscreen);
      if (!fullscreenButton) return;
      if (isFullscreen) {
        fullscreenButton.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>';
        fullscreenButton.title = '退出全屏';
      } else {
        fullscreenButton.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>';
        fullscreenButton.title = '全屏放大';
      }
    }

    function noteAnchorForSlide(slideNumber) {
      const note = document.getElementById(`note-${Number(slideNumber)}`);
      if (!note) {
        return { slideNumber: Number(slideNumber), absoluteTop: noteRoot.scrollTop, relativeTop: 0 };
      }
      const noteTop = note.offsetTop - noteRoot.offsetTop;
      return {
        slideNumber: Number(slideNumber),
        absoluteTop: noteRoot.scrollTop,
        relativeTop: noteRoot.scrollTop - noteTop,
      };
    }

    function restoreNoteAnchor(anchor) {
      if (!anchor) return;
      const note = document.getElementById(`note-${Number(anchor.slideNumber)}`);
      const maxTop = Math.max(0, noteRoot.scrollHeight - noteRoot.clientHeight);
      const rawTop = note
        ? (note.offsetTop - noteRoot.offsetTop) + Number(anchor.relativeTop || 0)
        : Number(anchor.absoluteTop || 0);
      noteRoot.scrollTo({ top: clamp(rawTop, 0, maxTop), behavior: 'auto' });
    }

    function preserveCurrentSlideAfterViewportChange(slideNumber = currentSlideNumber) {
      const targetSlide = Number(slideNumber || currentSlideNumber || 1);
      if (!pageForSlide(targetSlide)) return;
      const now = Date.now();
      if (!viewportAnchorState || now > viewportAnchorState.until) {
        viewportAnchorState = {
          targetSlide,
          noteAnchor: noteAnchorForSlide(targetSlide),
          until: now + VIEWPORT_ANCHOR_MS,
        };
      } else {
        viewportAnchorState.until = now + VIEWPORT_ANCHOR_MS;
      }
      suppressObserverUntil = viewportAnchorState.until;
      viewportAnchorTimers.forEach(timer => window.clearTimeout(timer));
      viewportAnchorTimers = [];
      window.clearTimeout(viewportAnchorReleaseTimer);
      const anchor = () => {
        const state = viewportAnchorState;
        if (!state) return;
        setActive(state.targetSlide, {
          scrollPage: true,
          scrollNote: false,
          behavior: 'auto',
          skipSave: true,
          skipChatRender: true,
        });
        restoreNoteAnchor(state.noteAnchor);
        saveScrollState();
      };
      window.requestAnimationFrame(anchor);
      [80, 180, 360, 700, 1100].forEach(delay => {
        viewportAnchorTimers.push(window.setTimeout(anchor, delay));
      });
      viewportAnchorReleaseTimer = window.setTimeout(() => {
        anchor();
        viewportAnchorState = null;
      }, VIEWPORT_ANCHOR_MS + 80);
    }

    function toggleFullscreen() {
      const targetSlide = currentSlideNumber;
      saveScrollState();
      preserveCurrentSlideAfterViewportChange(targetSlide);
      if (!document.fullscreenElement) {
        syncFullscreenState(true);
        document.documentElement.requestFullscreen()
          .catch(() => syncFullscreenState(false))
          .finally(() => preserveCurrentSlideAfterViewportChange(targetSlide));
      } else {
        document.exitFullscreen()
          .catch(() => {})
          .finally(() => {
            preserveCurrentSlideAfterViewportChange(targetSlide);
            scheduleParentReaderCenter({ behavior: 'auto', delay: 180 });
          });
      }
    }

    function startResize(event) {
      const handle = event.target.closest('[data-resize-handle]');
      if (!handle) return;
      event.preventDefault();
      activeResize = {
        handle,
        kind: handle.dataset.resizeHandle,
        startX: event.clientX,
        start: { ...layoutState },
      };
      handle.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    }

    function updateResize(event) {
      if (!activeResize) return;
      event.preventDefault();
      const gridWidth = Math.max(1, readerGrid.getBoundingClientRect().width);
      const delta = (event.clientX - activeResize.startX) / gridWidth * 4;
      if (activeResize.kind === 'pages-notes') {
        layoutState.pages = clamp(activeResize.start.pages + delta, 0.35, 3.2);
        layoutState.notes = clamp(activeResize.start.notes - delta, 0.35, 3.2);
      } else {
        layoutState.notes = clamp(activeResize.start.notes + delta, 0.35, 3.2);
        layoutState.chat = clamp(activeResize.start.chat - delta, 0.28, 2.4);
        if (chatCollapsed && delta < -0.02) chatCollapsed = false;
      }
      applyLayoutState();
    }

    function stopResize() {
      if (!activeResize) return;
      activeResize.handle.classList.remove('dragging');
      activeResize = null;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      saveLayoutState();
    }

    function saveScrollState() {
      if (!deckId) return;
      localStorage.setItem(storageKey('pageScroll'), String(pageRoot.scrollTop));
      localStorage.setItem(storageKey('noteScroll'), String(noteRoot.scrollTop));
      localStorage.setItem(storageKey('currentSlide'), String(currentSlideNumber));
    }

    function scheduleScrollStateSave() {
      if (viewportAnchorState) return;
      window.clearTimeout(scrollStateSaveTimer);
      scrollStateSaveTimer = window.setTimeout(saveScrollState, 140);
    }

    function readScrollState() {
      if (!deckId) return null;
      return {
        pageScroll: Number(localStorage.getItem(storageKey('pageScroll')) || 0),
        noteScroll: Number(localStorage.getItem(storageKey('noteScroll')) || 0),
        currentSlide: Number(localStorage.getItem(storageKey('currentSlide')) || currentSlideNumber || 1),
      };
    }

    function pageForSlide(slideNumber) {
      return pages.find(item => Number(item.slideNumber) === Number(slideNumber)) || null;
    }

    function pageIndexForSlide(slideNumber) {
      return pages.findIndex(item => Number(item.slideNumber) === Number(slideNumber));
    }

    function pageIndexDistance(slideNumber, centerSlideNumber) {
      const index = pageIndexForSlide(slideNumber);
      const centerIndex = pageIndexForSlide(centerSlideNumber);
      if (index < 0 || centerIndex < 0) return Number.POSITIVE_INFINITY;
      return Math.abs(index - centerIndex);
    }

    function shouldHydrateNote(slideNumber, centerSlideNumber) {
      return pageIndexDistance(slideNumber, centerSlideNumber) <= NOTE_HYDRATE_RADIUS;
    }

    function renderPageVisual(page) {
      if (page.image) {
        return `<img src="${page.image}" alt="第 ${page.slideNumber} 页原页面" loading="lazy" />`;
      }
      const text = page.imageAvailable ? '原页面按需加载中' : '暂无原页面图片';
      return `<div class="page-placeholder">${escapeHtml(text)}</div>`;
    }

    function renderNoteBody(page, hydrate = false) {
      if (hydrate) {
        return `<div class="note-body" data-hydrated="1">${renderMarkdown(page.explanation)}</div>`;
      }
      return '<div class="note-body lazy" data-hydrated="0">讲解按需渲染</div>';
    }

    function hydrateNote(slideNumber) {
      const page = pageForSlide(slideNumber);
      const note = document.getElementById(`note-${Number(slideNumber)}`);
      const body = note?.querySelector?.('.note-body');
      const editor = note?.querySelector?.('.note-editor');
      if (!page || !body || body.dataset.hydrated === '1') return Promise.resolve(false);
      const hydrateKey = Number(slideNumber);
      const pending = hydratingNotePromises.get(hydrateKey);
      if (pending?.body === body) return pending.promise;
      body.innerHTML = renderMarkdown(page.explanation);
      body.classList.remove('lazy');
      body.dataset.hydrated = '1';
      if (editor) editor.value = String(page.explanation || '');
      const promise = typesetTargets([body])
        .then(() => true)
        .finally(() => {
          const latest = hydratingNotePromises.get(hydrateKey);
          if (latest?.body === body) hydratingNotePromises.delete(hydrateKey);
        });
      hydratingNotePromises.set(hydrateKey, { body, promise });
      return promise;
    }

    function requestImageWindowIfNeeded(slideNumber) {
      const page = pageForSlide(slideNumber);
      if (!page || !page.imageAvailable || page.image) return;
      const key = `${deckId}:${Number(slideNumber)}`;
      if (key === lastPositionNotifyKey) return;
      lastPositionNotifyKey = key;
      window.clearTimeout(positionNotifyTimer);
      positionNotifyTimer = window.setTimeout(() => {
        Streamlit.setComponentValue({
          action: 'reader_position',
          token: createComponentToken(),
          deckId,
          slideNumber: Number(slideNumber),
        });
      }, IMAGE_WINDOW_NOTIFY_IDLE_MS);
    }

    function ensureNearbyContent(slideNumber) {
      pages.forEach(page => {
        const pageNumber = Number(page.slideNumber);
        if (shouldHydrateNote(pageNumber, slideNumber)) hydrateNote(pageNumber);
      });
      requestImageWindowIfNeeded(slideNumber);
    }

    function scheduleNearbyContent(slideNumber) {
      pendingNearbySlideNumber = Number(slideNumber);
      window.clearTimeout(nearbyContentTimer);
      nearbyContentTimer = window.setTimeout(() => {
        nearbyContentTimer = null;
        const slideToHydrate = pendingNearbySlideNumber;
        pendingNearbySlideNumber = null;
        if (!pageForSlide(slideToHydrate)) return;
        ensureNearbyContent(slideToHydrate);
      }, NEARBY_CONTENT_IDLE_MS);
    }

    function maxSlideNumber() {
      if (!pages.length) return 1;
      return Math.max(...pages.map(page => Number(page.slideNumber || 1)));
    }

    function updatePageJumpDisplay() {
      const maxPage = maxSlideNumber();
      if (pageJumpInput && document.activeElement !== pageJumpInput) {
        pageJumpInput.value = String(currentSlideNumber || 1);
      }
      if (pageJumpInput) {
        pageJumpInput.max = String(maxPage);
      }
      if (pageJumpTotal) {
        pageJumpTotal.textContent = String(maxPage);
      }
    }

    function nearestSlideNumber(value) {
      if (!pages.length) return 1;
      const requested = clamp(
        Math.round(Number(value) || currentSlideNumber || 1),
        1,
        maxSlideNumber()
      );
      if (pageForSlide(requested)) return requested;

      return pages.reduce((closest, page) => {
        const slideNumber = Number(page.slideNumber || 1);
        return Math.abs(slideNumber - requested) < Math.abs(closest - requested)
          ? slideNumber
          : closest;
      }, Number(pages[0].slideNumber || 1));
    }

    function jumpToPageInputValue() {
      if (!pageJumpInput) return;
      const targetSlide = nearestSlideNumber(pageJumpInput.value);
      pageJumpInput.value = String(targetSlide);
      if (targetSlide === currentSlideNumber) {
        updatePageJumpDisplay();
        return;
      }
      setActive(targetSlide, { scrollPage: true, behavior: 'smooth' });
    }

    function sectionForSlide(slideNumber) {
      const page = pageForSlide(slideNumber);
      const sectionIndex = Number(page?.sectionIndex || 0);
      if (sectionIndex) {
        const direct = sections.find(item => Number(item.sectionIndex) === sectionIndex);
        if (direct) return direct;
      }
      return sections.find(item => {
        const start = Number(item.startSlide || 0);
        const end = Number(item.endSlide || 0);
        return start <= Number(slideNumber) && Number(slideNumber) <= end;
      }) || null;
    }

    function createComponentToken() {
      return `${Date.now()}_${Math.random().toString(36).slice(2)}`;
    }

    function noteMetaText(page) {
      return `${String(page.model || '未生成')} ${page.createdAt ? '· ' + String(page.createdAt) : ''}`;
    }

    function applyPendingExplanationOverrides(nextPages) {
      const now = Date.now();
      return nextPages.map(page => {
        const slideNumber = Number(page.slideNumber);
        const pending = pendingExplanationSaves.get(slideNumber);
        if (!pending) return page;
        if (now - pending.startedAt > PENDING_SAVE_TTL_MS) {
          pendingExplanationSaves.delete(slideNumber);
          return page;
        }
        if (String(page.explanation || '') === pending.explanation) {
          pendingExplanationSaves.delete(slideNumber);
          return page;
        }
        return { ...page, explanation: pending.explanation };
      });
    }

    function buildReaderStructureSignature(nextDeckId, nextPages, nextSections) {
      return JSON.stringify({
        deckId: Number(nextDeckId || 0),
        pages: nextPages.map(page => [
          Number(page.slideNumber || 0),
          String(page.title || ''),
          String(page.pageType || ''),
          Number(page.sectionIndex || 0),
          String(page.summary || ''),
          String(page.slideRole || ''),
          String(page.keyPoints || ''),
        ]),
        sections: nextSections.map(section => [
          Number(section.sectionIndex || 0),
          Number(section.startSlide || 0),
          Number(section.endSlide || 0),
          String(section.title || ''),
          String(section.summary || ''),
        ]),
      });
    }

    function applyLocalExplanationUpdate(slideNumber, explanation, options = {}) {
      const page = pageForSlide(slideNumber);
      const note = document.getElementById(`note-${Number(slideNumber)}`);
      const body = note?.querySelector?.('.note-body');
      const editor = note?.querySelector?.('.note-editor');
      if (!page || !note || !body) return Promise.resolve(false);

      const previousNoteScroll = noteRoot.scrollTop;
      const previousPageScroll = pageRoot.scrollTop;
      page.explanation = explanation;
      body.innerHTML = renderMarkdown(explanation);
      body.classList.remove('lazy');
      body.dataset.hydrated = '1';
      if (editor) editor.value = explanation;
      if (!options.keepEditing) note.classList.remove('editing');

      return typesetTargets([body]).finally(() => {
        noteRoot.scrollTop = previousNoteScroll;
        pageRoot.scrollTop = previousPageScroll;
        if (options.statusText) selectionHint.textContent = options.statusText;
      }).then(() => true);
    }

    function sendExplanationSave(slideNumber, explanation) {
      const token = createComponentToken();
      const normalizedSlideNumber = Number(slideNumber);
      pendingExplanationSaves.set(normalizedSlideNumber, {
        token,
        explanation,
        startedAt: Date.now(),
      });
      Streamlit.setComponentValue({
        action: 'save_explanation_edit',
        token,
        deckId,
        slideNumber: normalizedSlideNumber,
        explanation,
      });
    }

    function patchRenderedReader(previousPages) {
      const previousBySlide = new Map(
        previousPages.map(page => [Number(page.slideNumber), page])
      );
      const typesetQueue = [];

      pages.forEach(page => {
        const slideNumber = Number(page.slideNumber);
        const previous = previousBySlide.get(slideNumber) || {};
        const note = document.getElementById(`note-${slideNumber}`);
        const pageArticle = document.getElementById(`page-${slideNumber}`);

        if (String(previous.image || '') !== String(page.image || '')) {
          const visual = pageArticle?.querySelector?.('.page-visual');
          if (visual) visual.innerHTML = renderPageVisual(page);
        }

        if (!note) return;

        const meta = note.querySelector('.note-meta');
        if (meta && meta.textContent !== noteMetaText(page)) {
          meta.textContent = noteMetaText(page);
        }

        if (String(previous.explanation || '') === String(page.explanation || '')) return;
        if (note.classList.contains('editing')) return;

        const body = note.querySelector('.note-body');
        const editor = note.querySelector('.note-editor');
        if (!body) return;
        body.innerHTML = renderMarkdown(page.explanation);
        body.classList.remove('lazy');
        body.dataset.hydrated = '1';
        if (editor) editor.value = String(page.explanation || '');
        typesetQueue.push(body);
      });

      return typesetQueue;
    }

    function renderSectionSelect() {
      if (!sectionSelect) return;
      if (!sections.length) {
        sectionSelect.innerHTML = '<option value="">未生成目录分块</option>';
        sectionSelect.disabled = true;
        return;
      }
      sectionSelect.disabled = false;
      sectionSelect.innerHTML = sections.map(section => {
        const label = `${section.sectionIndex}. ${section.title || '未命名目录块'}（${section.startSlide}-${section.endSlide}页）`;
        return `<option value="${Number(section.sectionIndex)}">${escapeHtml(label)}</option>`;
      }).join('');
    }

    function updateSectionSelect(slideNumber) {
      if (!sectionSelect || !sections.length) return;
      const section = sectionForSlide(slideNumber);
      if (section) sectionSelect.value = String(Number(section.sectionIndex));
    }

    function centerPage(slideNumber, behavior = 'smooth') {
      const page = document.getElementById(`page-${Number(slideNumber)}`);
      if (!page) return;
      const top = page.offsetTop - Math.max(0, (pageRoot.clientHeight - page.offsetHeight) / 2);
      pageRoot.scrollTo({ top, behavior });
    }

    function navigateSlide(delta) {
      if (!pages.length) return;
      const currentIndex = Math.max(0, pageIndexForSlide(currentSlideNumber));
      const nextIndex = clamp(currentIndex + delta, 0, pages.length - 1);
      const nextSlide = Number(pages[nextIndex].slideNumber);
      if (nextSlide === currentSlideNumber) {
        centerPage(nextSlide, 'smooth');
        return;
      }
      setActive(nextSlide, { scrollPage: true, behavior: 'smooth' });
    }

    function setActive(pageNumber, options = {}) {
      const nextSlideNumber = Number(pageNumber || 1);
      if (!pageForSlide(nextSlideNumber)) return;
      const sameSlide = nextSlideNumber === currentSlideNumber;
      const currentPage = document.getElementById(`page-${nextSlideNumber}`);
      const currentNote = document.getElementById(`note-${nextSlideNumber}`);
      if (
        sameSlide
        && currentPage?.classList.contains('active')
        && currentNote?.classList.contains('active')
        && !options.scrollPage
        && !options.forceNoteScroll
      ) {
        scheduleScrollStateSave();
        return;
      }
      currentSlideNumber = nextSlideNumber;
      document.querySelectorAll('.page.active,.note.active').forEach(el => el.classList.remove('active'));
      const page = document.getElementById(`page-${currentSlideNumber}`);
      const note = document.getElementById(`note-${currentSlideNumber}`);
      if (page) page.classList.add('active');
      if (note) {
        note.classList.add('active');
        if (options.scrollNote !== false && (!sameSlide || options.forceNoteScroll)) {
          noteRoot.scrollTo({
            top: note.offsetTop - noteRoot.offsetTop,
            behavior: options.noteBehavior || options.behavior || 'smooth',
          });
        }
      }
      updatePageJumpDisplay();
      updateSectionSelect(currentSlideNumber);
      if (!options.skipChatRender) renderChatForPage(currentSlideNumber);
      if (options.scrollPage) {
        centerPage(currentSlideNumber, options.behavior || 'smooth');
      }
      if (options.immediateNearbyContent) {
        ensureNearbyContent(currentSlideNumber);
      } else {
        scheduleNearbyContent(currentSlideNumber);
      }
      if (!options.skipSave) saveScrollState();
    }

    function startEditExplanation(slideNumber) {
      const page = pageForSlide(slideNumber);
      const note = document.getElementById(`note-${Number(slideNumber)}`);
      const editor = note?.querySelector?.('.note-editor');
      if (!page || !note || !editor) return;
      editor.value = String(page.explanation || '');
      note.classList.add('editing');
      editor.focus();
    }

    function cancelEditExplanation(slideNumber) {
      const page = pageForSlide(slideNumber);
      const note = document.getElementById(`note-${Number(slideNumber)}`);
      const editor = note?.querySelector?.('.note-editor');
      if (!page || !note || !editor) return;
      editor.value = String(page.explanation || '');
      note.classList.remove('editing');
    }

    function saveEditedExplanation(slideNumber, button = null) {
      const page = pageForSlide(slideNumber);
      const note = document.getElementById(`note-${Number(slideNumber)}`);
      const editor = note?.querySelector?.('.note-editor');
      if (!page || !note || !editor) return;
      const explanation = editor.value.trim();
      if (!explanation) {
        editor.focus();
        return;
      }
      if (button) {
        button.disabled = true;
        button.textContent = '保存中';
      }
      applyLocalExplanationUpdate(slideNumber, explanation, {
        statusText: `第 ${Number(slideNumber)} 页修改已显示，正在后台保存`,
      }).finally(() => {
        if (!button) return;
        button.textContent = '已保存';
        window.setTimeout(() => {
          button.disabled = false;
          button.textContent = '保存修改';
        }, 700);
      });
      sendExplanationSave(slideNumber, explanation);
    }

    function markdownSearchText(source) {
      let text = '';
      const map = [];
      let lastWasSpace = false;
      const markdownMarkers = new Set(['#', '*', '_', '`', '>', '|']);
      for (let index = 0; index < source.length; index += 1) {
        const char = source[index];
        if (source.startsWith('==', index) && !isLikelyEqualityOperator(source, index)) {
          index += 1;
          continue;
        }
        if (markdownMarkers.has(char)) continue;
        if (/\s/.test(char)) {
          if (!lastWasSpace) {
            text += ' ';
            map.push(index);
            lastWasSpace = true;
          }
          continue;
        }
        text += char;
        map.push(index);
        lastWasSpace = false;
      }
      return { text, map };
    }

    function collapsedSearchText(source) {
      let text = '';
      let lastWasSpace = false;
      const sourceText = String(source || '');
      for (let index = 0; index < sourceText.length; index += 1) {
        const char = sourceText[index];
        if (/\s/.test(char)) {
          if (!lastWasSpace) {
            text += ' ';
            lastWasSpace = true;
          }
          continue;
        }
        text += char;
        lastWasSpace = false;
      }
      return text;
    }

    function locateMarkdownSelection(source, payload) {
      const candidates = [
        payload.selectedTextRaw,
        payload.selectedText,
      ].map(value => String(value || '').trim()).filter(Boolean);

      const normalizedTarget = String(payload.selectedText || '').replace(/\s+/g, ' ').trim();
      if (normalizedTarget) {
        const searchable = markdownSearchText(source);
        const beforeContext = String(payload.contextBefore || '').replace(/\s+/g, ' ').trim();
        const afterContext = String(payload.contextAfter || '').replace(/\s+/g, ' ').trim();
        const beforeAnchor = beforeContext.slice(-100);
        const afterAnchor = afterContext.slice(0, 100);
        const expectedStart = Number.isFinite(Number(payload.selectionStartOffset))
          ? Number(payload.selectionStartOffset)
          : null;
        let bestIndex = -1;
        let bestScore = Number.NEGATIVE_INFINITY;
        let searchFrom = 0;
        while (searchFrom <= searchable.text.length) {
          const found = searchable.text.indexOf(normalizedTarget, searchFrom);
          if (found < 0) break;
          let score = 0;
          if (expectedStart !== null) {
            score -= Math.abs(found - expectedStart) * 4;
          }
          if (beforeAnchor) {
            const beforeWindow = searchable.text.slice(Math.max(0, found - beforeAnchor.length - 20), found);
            if (beforeWindow.endsWith(beforeAnchor)) score += beforeAnchor.length;
          }
          if (afterAnchor) {
            const afterStart = found + normalizedTarget.length;
            const afterWindow = searchable.text.slice(afterStart, afterStart + afterAnchor.length + 20);
            if (afterWindow.startsWith(afterAnchor)) score += afterAnchor.length;
          }
          if (score > bestScore) {
            bestScore = score;
            bestIndex = found;
          }
          searchFrom = found + Math.max(1, normalizedTarget.length);
        }
        if (bestIndex >= 0) {
          const start = searchable.map[bestIndex];
          const endMapIndex = bestIndex + normalizedTarget.length - 1;
          const end = (searchable.map[endMapIndex] ?? start) + 1;
          return { start, end };
        }
      }

      for (const candidate of candidates) {
        const index = source.indexOf(candidate);
        if (index >= 0) return { start: index, end: index + candidate.length };
      }

      return null;
    }

    function markdownHighlightBounds(source, location) {
      if (!location) return null;
      let index = 0;
      while (index < source.length) {
        const open = findHighlightDelimiter(source, index);
        if (open < 0) return null;
        const close = findHighlightDelimiter(source, open + 2);
        if (close < 0) return null;
        const contentStart = open + 2;
        const contentEnd = close;
        if (contentStart <= location.start && location.end <= contentEnd) {
          return { open, closeEnd: close + 2, contentStart, contentEnd };
        }
        index = close + 2;
      }
      return null;
    }

    function markdownSelectionHighlightState(source, payload) {
      const location = locateMarkdownSelection(source, payload);
      const bounds = markdownHighlightBounds(source, location);
      return {
        location,
        bounds,
        isHighlighted: Boolean(location && bounds),
      };
    }

    function removeMarkdownHighlight(source, location, bounds) {
      const before = source.slice(bounds.contentStart, location.start);
      const selected = source.slice(location.start, location.end);
      const after = source.slice(location.end, bounds.contentEnd);
      return [
        source.slice(0, bounds.open),
        before ? `==${before}==` : '',
        selected,
        after ? `==${after}==` : '',
        source.slice(bounds.closeEnd),
      ].join('');
    }

    function wrapMarkdownSelection(source, payload) {
      const state = markdownSelectionHighlightState(source, payload);
      if (!state.location) return null;
      if (state.isHighlighted) {
        return {
          source: removeMarkdownHighlight(source, state.location, state.bounds),
          action: 'remove',
        };
      }
      const start = state.location.start;
      const end = state.location.end;
      return {
        source: `${source.slice(0, start)}==${source.slice(start, end)}==${source.slice(end)}`,
        action: 'add',
      };
    }

    function highlightCurrentSelection() {
      const payload = currentSelectionPayload || buildSelectionPayload();
      if (!payload) return;
      const page = pageForSlide(payload.slideNumber);
      if (!page) return;
      const result = wrapMarkdownSelection(String(page.explanation || ''), payload);
      if (!result) {
        selectionHint.textContent = '未能在讲解 Markdown 中定位选中文本';
        return;
      }
      const statusText = result.action === 'remove'
        ? '已取消 Markdown 高亮，正在后台保存'
        : '已添加 Markdown 高亮，正在后台保存';
      selectionHint.textContent = statusText;
      window.getSelection()?.removeAllRanges();
      hideSelectionToolbar();
      applyLocalExplanationUpdate(payload.slideNumber, result.source, {
        statusText: result.action === 'remove' ? '高亮已取消，正在后台保存' : '高亮已显示，正在后台保存',
      });
      sendExplanationSave(payload.slideNumber, result.source);
    }

    function refreshNoteDisplay(slideNumber, button = null) {
      const page = pageForSlide(slideNumber);
      const note = document.getElementById(`note-${Number(slideNumber)}`);
      const body = note?.querySelector?.('.note-body');
      if (!page || !body) return;

      const previousScrollTop = noteRoot.scrollTop;
      body.innerHTML = renderMarkdown(page.explanation);
      body.classList.remove('lazy');
      body.dataset.hydrated = '1';
      if (button) {
        button.disabled = true;
        button.textContent = '刷新中';
      }
      typesetTargets([body]).finally(() => {
        noteRoot.scrollTop = previousScrollTop;
        if (!button) return;
        button.textContent = '已刷新';
        window.setTimeout(() => {
          button.disabled = false;
          button.textContent = '刷新显示';
        }, 900);
      });
    }

    function renderPageContext(page) {
      const section = sectionForSlide(page.slideNumber);
      const chips = [
        page.pageType ? `<span class="note-chip">${escapeHtml(page.pageType)}</span>` : '',
        section ? `<span class="note-chip">${escapeHtml(section.title || '未命名目录块')}</span>` : '',
      ].filter(Boolean).join('');
      const summary = page.summary ? `<div class="note-context-text">摘要：${escapeHtml(page.summary)}</div>` : '';
      const role = page.slideRole ? `<div class="note-context-text">作用：${escapeHtml(page.slideRole)}</div>` : '';
      const keyPoints = page.keyPoints ? `<div class="note-context-text">抓手：${escapeHtml(page.keyPoints)}</div>` : '';
      if (!chips && !summary && !role && !keyPoints) return '';
      return `
        <div class="note-context">
          ${chips ? `<div class="note-context-row">${chips}</div>` : ''}
          ${summary}
          ${role}
          ${keyPoints}
        </div>
      `;
    }

    function renderReader(args) {
      const previousPages = pages;
      restoreScrollAfterRender = {
        pageScroll: pageRoot.scrollTop,
        noteScroll: noteRoot.scrollTop,
        currentSlide: currentSlideNumber,
      };
      const incomingPages = Array.isArray(args.pages) ? args.pages : [];
      const incomingSections = Array.isArray(args.sections) ? args.sections : [];
      const nextDeckId = Number(args.deck_id || 0);
      if (nextDeckId && nextDeckId !== deckId) {
        hasCenteredOnEntry = false;
        pendingExplanationSaves.clear();
        hydratingNotePromises.clear();
        pendingTypesetTargets.clear();
        window.clearTimeout(nearbyContentTimer);
        nearbyContentTimer = null;
        pendingNearbySlideNumber = null;
      }
      const nextPages = applyPendingExplanationOverrides(incomingPages);
      const nextStructureSignature = buildReaderStructureSignature(nextDeckId, nextPages, incomingSections);
      const canPatchRenderedReader = Boolean(
        nextDeckId
        && nextDeckId === deckId
        && readerStructureSignature === nextStructureSignature
        && pageRoot.children.length
        && noteRoot.children.length
      );
      deckId = nextDeckId;
      pages = nextPages;
      sections = incomingSections;
      activeModel = String(args.active_model || '');
      const height = Number(args.height || 850);
      frame.style.height = `${Math.max(360, height - 15)}px`;
      Streamlit.setFrameHeight(height);
      loadLayoutState();
      loadReadingMode();
      const stored = readScrollState();
      const requestedSlide = Number(
        stored?.currentSlide || args.initial_slide_number || restoreScrollAfterRender?.currentSlide || pages[0]?.slideNumber || 1
      );
      const targetSlide = pageForSlide(requestedSlide) ? requestedSlide : Number(pages[0]?.slideNumber || 1);

      deckTitle.textContent = String(args.title || '学习资料');
      deckMeta.textContent = `${String(args.subject || '未分类')} · 原页面同步阅读`;
      updatePageJumpDisplay();
      renderSectionSelect();
      if (!pendingExplanationSaves.size) {
        selectionHint.textContent = '可引用到插问、复制或高亮选中文本';
      }
      canvasChatMeta.textContent = `当前模型：${activeModel || '当前模型'} · 回答保存为对应页插问`;
      if (canvasSendButton.disabled) {
        canvasInput.value = '';
        currentChatQuote = null;
        renderQuotePreview();
        canvasHint.textContent = '回答已保存，可继续围绕当前页追问';
      }
      canvasSendButton.disabled = false;
      canvasSendButton.textContent = '问当前模型';

      if (canPatchRenderedReader) {
        const previousPageScroll = restoreScrollAfterRender.pageScroll;
        const previousNoteScroll = restoreScrollAfterRender.noteScroll;
        const typesetQueue = patchRenderedReader(previousPages);
        currentSlideNumber = pageForSlide(currentSlideNumber)
          ? currentSlideNumber
          : targetSlide;
        updatePageJumpDisplay();
        updateSectionSelect(currentSlideNumber);
        renderChatForPage(currentSlideNumber);
        ensureNearbyContent(currentSlideNumber);
        pageRoot.scrollTop = previousPageScroll;
        noteRoot.scrollTop = previousNoteScroll;
        if (typesetQueue.length) {
          typesetTargets(typesetQueue).finally(() => {
            pageRoot.scrollTop = previousPageScroll;
            noteRoot.scrollTop = previousNoteScroll;
          });
        }
        return;
      }

      readerStructureSignature = nextStructureSignature;
      if (observer) {
        observer.disconnect();
        observer = null;
      }

      pageRoot.innerHTML = pages.map(page => {
        const section = sectionForSlide(page.slideNumber);
        const pageMeta = [
          page.pageType || '',
          section ? section.title || '' : '',
        ].filter(Boolean).join(' · ');
        return `
          <article class="page" id="page-${page.slideNumber}" data-page="${page.slideNumber}">
            <div class="page-label">
              <span>第 ${page.slideNumber} 页</span>
              <span>${escapeHtml(page.title)}</span>
              ${pageMeta ? `<span>${escapeHtml(pageMeta)}</span>` : ''}
            </div>
            <div class="page-visual">
              ${renderPageVisual(page)}
            </div>
          </article>
        `;
      }).join('');

      noteRoot.innerHTML = pages.map(page => `
        <article class="note" id="note-${page.slideNumber}" data-page="${page.slideNumber}">
          <div class="note-header">
            <h3>第 ${page.slideNumber} 页讲解</h3>
            <div class="note-actions">
              <button type="button" class="note-action-button" data-edit-page="${page.slideNumber}" title="手动修改本页讲解">编辑讲解</button>
              <button type="button" class="note-refresh" data-refresh-page="${page.slideNumber}" title="重新渲染本页 Markdown 和公式">刷新显示</button>
            </div>
          </div>
          <div class="note-meta">${escapeHtml(page.model || '未生成')} ${page.createdAt ? '· ' + escapeHtml(page.createdAt) : ''}</div>
          ${renderPageContext(page)}
          ${renderNoteBody(page, shouldHydrateNote(Number(page.slideNumber), targetSlide))}
          <div class="note-edit-panel">
            <textarea class="note-editor" spellcheck="false">${shouldHydrateNote(Number(page.slideNumber), targetSlide) ? escapeHtml(page.explanation || '') : ''}</textarea>
            <div class="note-edit-actions">
              <button type="button" class="note-action-button note-cancel" data-cancel-edit-page="${page.slideNumber}">取消</button>
              <button type="button" class="note-action-button note-save" data-save-edit-page="${page.slideNumber}">保存修改</button>
            </div>
          </div>
        </article>
      `).join('');

      observer = new IntersectionObserver((entries) => {
        if (Date.now() < suppressObserverUntil) return;
        const visible = entries
          .filter(entry => entry.isIntersecting)
          .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
        if (!visible) return;
        setActive(visible.target.dataset.page);
      }, {
        root: pageRoot,
        threshold: [0.35, 0.5, 0.65, 0.8],
      });

      document.querySelectorAll('.page').forEach(page => observer.observe(page));
      if (pages.length) setActive(targetSlide);
      window.setTimeout(() => {
        const state = stored || restoreScrollAfterRender;
        if (!state) return;
        if (readingMode === 'paged' || !stored) {
          centerPage(targetSlide, 'auto');
        } else {
          pageRoot.scrollTop = state.pageScroll || 0;
        }
        noteRoot.scrollTop = state.noteScroll || 0;
        renderChatForPage(currentSlideNumber);
      }, 80);
      const hydratedBodies = Array.from(noteRoot.querySelectorAll('.note-body[data-hydrated="1"]'));
      typesetTargets([...hydratedBodies, canvasMessages]);
      if (!hasCenteredOnEntry && pages.length) {
        hasCenteredOnEntry = true;
        scheduleParentReaderCenter({
          behavior: 'auto',
          delay: 160,
          skipIfAboveViewport: true,
        });
      }
    }

    function clipText(value, limit) {
      const text = String(value ?? '').replace(/\s+/g, ' ').trim();
      if (text.length <= limit) return text;
      return text.slice(0, limit).trim() + '...';
    }

    function clipRawText(value, limit) {
      const text = String(value ?? '').trim();
      if (text.length <= limit) return text;
      return text.slice(0, limit).trim() + '...';
    }

    function nodeElement(node) {
      if (!node) return null;
      return node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;
    }

    function buildSelectionPayload() {
      const selection = window.getSelection();
      if (!selection || selection.isCollapsed || selection.rangeCount === 0) return null;
      const selectedText = selection.toString().trim();
      if (selectedText.length < 2) return null;

      const range = selection.getRangeAt(0);
      const startElement = nodeElement(range.startContainer);
      const endElement = nodeElement(range.endContainer);
      if (startElement?.closest?.('.note-editor') || endElement?.closest?.('.note-editor')) return null;
      const note = startElement?.closest?.('.note');
      if (!note || !noteRoot.contains(note) || !endElement || !note.contains(endElement)) return null;

      const noteBody = note.querySelector('.note-body');
      if (!noteBody) return null;
      if (!noteBody.contains(startElement) || !noteBody.contains(endElement)) return null;

      const beforeRange = document.createRange();
      beforeRange.selectNodeContents(noteBody);
      beforeRange.setEnd(range.startContainer, range.startOffset);
      const beforeRaw = beforeRange.toString();

      const afterRange = document.createRange();
      afterRange.selectNodeContents(noteBody);
      afterRange.setStart(range.endContainer, range.endOffset);
      const afterRaw = afterRange.toString();

      const before = collapsedSearchText(beforeRaw);
      const after = collapsedSearchText(afterRaw);
      const selectionStartOffset = before.length;
      const slideNumber = Number(note.dataset.page);
      const page = pages.find(item => Number(item.slideNumber) === slideNumber) || {};
      const startHighlight = startElement?.closest?.('.reader-highlight');
      const endHighlight = endElement?.closest?.('.reader-highlight');
      const payload = {
        action: 'branch_quote',
        token: `${Date.now()}_${Math.random().toString(36).slice(2)}`,
        deckId,
        slideNumber,
        slideTitle: page.title || `第 ${slideNumber} 页`,
        selectedText: clipText(selectedText, 1200),
        selectedTextRaw: clipRawText(selectedText, 1200),
        contextBefore: clipText(before.slice(-700), 700),
        contextAfter: clipText(after.slice(0, 700), 700),
        selectionStartOffset,
      };
      const markdownState = markdownSelectionHighlightState(String(page.explanation || ''), payload);
      payload.isHighlighted = Boolean(
        markdownState.isHighlighted || (startHighlight && startHighlight === endHighlight)
      );
      return payload;
    }

    function showSelectionToolbar() {
      const payload = buildSelectionPayload();
      if (!payload) {
        hideSelectionToolbar();
        return;
      }
      currentSelectionPayload = payload;
      const selection = window.getSelection();
      const rect = selection.getRangeAt(0).getBoundingClientRect();
      const left = Math.min(Math.max(8, rect.left), Math.max(8, window.innerWidth - 570));
      const top = Math.max(8, rect.top - 52);
      selectionToolbar.style.left = `${left}px`;
      selectionToolbar.style.top = `${top}px`;
      highlightSelectionButton.textContent = payload.isHighlighted ? '取消高亮' : '高亮';
      highlightSelectionButton.title = payload.isHighlighted ? '取消所选文字的 Markdown 高亮' : '用 Markdown 高亮所选文字';
      selectionHint.textContent = `第 ${payload.slideNumber} 页：${clipText(payload.selectedText, 42)}`;
      selectionToolbar.classList.add('show');
    }

    function hideSelectionToolbar() {
      currentSelectionPayload = null;
      selectionToolbar.classList.remove('show');
    }

    function quoteTextForClipboard(payload) {
      return [
        `引用自第 ${payload.slideNumber} 页：${payload.slideTitle}`,
        '',
        payload.selectedText,
        '',
        '前文上下文：',
        payload.contextBefore || '无',
        '',
        '后文上下文：',
        payload.contextAfter || '无',
      ].join('\n');
    }

    function renderQuotePreview() {
      if (!currentChatQuote) {
        quotePreview.classList.remove('show');
        quotePreviewText.textContent = '';
        return;
      }
      quotePreviewText.textContent = `已引用第 ${currentChatQuote.slideNumber} 页：${clipText(currentChatQuote.selectedText, 140)}`;
      quotePreview.classList.add('show');
    }

    function renderChatForPage(slideNumber) {
      const page = pageForSlide(slideNumber);
      if (!page) {
        canvasContext.textContent = '当前上下文：未识别页面';
        canvasMessages.innerHTML = '<div class="canvas-empty">还没有可用上下文。</div>';
        return;
      }
      const section = sectionForSlide(slideNumber);
      const contextParts = [
        `第 ${page.slideNumber} 页`,
        page.title || '未命名页面',
        section ? `目录块：${section.title || '未命名目录块'}` : '',
        page.pageType || '',
      ].filter(Boolean);
      canvasContext.textContent = `当前上下文：${contextParts.join(' · ')}`;
      const messages = Array.isArray(page.questions) ? page.questions : [];
      if (!messages.length) {
        canvasMessages.innerHTML = `
          <div class="canvas-empty">
            本页还没有插问。你可以直接围绕当前 PPT 页面和右侧讲解提问；回答会保存到这一页，不会覆盖主线讲解。
          </div>
        `;
        return;
      }
      canvasMessages.innerHTML = messages.map(item => `
        <div class="chat-turn">
          <div class="chat-question">${escapeHtml(item.question || '').replaceAll('\n', '<br>')}</div>
          <div class="chat-answer">${renderMarkdown(item.answer || '')}</div>
          <div class="chat-turn-meta">${escapeHtml(item.model || '未知模型')} ${item.createdAt ? '· ' + escapeHtml(item.createdAt) : ''}</div>
        </div>
      `).join('');
      canvasMessages.scrollTop = canvasMessages.scrollHeight;
      typesetTargets([canvasMessages]);
    }

    function sendCanvasQuestion() {
      const question = canvasInput.value.trim();
      if (!question) {
        canvasHint.textContent = '请先输入问题';
        canvasInput.focus();
        return;
      }
      const page = pageForSlide(currentSlideNumber);
      if (!page) {
        canvasHint.textContent = '当前页上下文不可用';
        return;
      }
      saveScrollState();
      canvasSendButton.disabled = true;
      canvasSendButton.textContent = '发送中...';
      canvasHint.textContent = `正在询问第 ${currentSlideNumber} 页`;
      Streamlit.setComponentValue({
        action: 'canvas_question',
        token: `${Date.now()}_${Math.random().toString(36).slice(2)}`,
        deckId,
        slideNumber: currentSlideNumber,
        question,
        quote: currentChatQuote,
      });
    }

    function sendSelectionToBranch() {
      const payload = currentSelectionPayload || buildSelectionPayload();
      if (!payload) return;
      openCanvasChat(true);
      currentChatQuote = payload;
      renderQuotePreview();
      canvasInput.focus();
      canvasHint.textContent = '已引用选中文本，将随下一次提问发送';
      selectionHint.textContent = '已引用到侧边插问栏';
      selectionToolbar.classList.remove('show');
    }

    function handlePagedWheel(event) {
      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation();
      const now = Date.now();
      pageWheelDelta += event.deltaY;
      if (Math.abs(pageWheelDelta) < 90 || now - lastPageSwitchAt < 260) return;
      const direction = pageWheelDelta > 0 ? 1 : -1;
      pageWheelDelta = 0;
      lastPageSwitchAt = now;
      navigateSlide(direction);
    }

    function handleReaderKeydown(event) {
      const target = event.target;
      const isEditing = target?.closest?.('textarea, input, select, button, [contenteditable="true"]');
      if (isEditing) return;
      if (readingMode !== 'paged') return;
      const key = event.key;
      if (key === 'ArrowDown' || key === 'PageDown' || (key === ' ' && !event.shiftKey)) {
        event.preventDefault();
        event.stopPropagation();
        navigateSlide(1);
      } else if (key === 'ArrowUp' || key === 'PageUp' || (key === ' ' && event.shiftKey)) {
        event.preventDefault();
        event.stopPropagation();
        navigateSlide(-1);
      } else if (key === 'Home') {
        event.preventDefault();
        event.stopPropagation();
        if (pages.length) setActive(Number(pages[0].slideNumber), { scrollPage: true, behavior: 'smooth' });
      } else if (key === 'End') {
        event.preventDefault();
        event.stopPropagation();
        if (pages.length) setActive(Number(pages[pages.length - 1].slideNumber), { scrollPage: true, behavior: 'smooth' });
      }
    }

    function copyCurrentSelection() {
      const payload = currentSelectionPayload || buildSelectionPayload();
      if (!payload) return;
      navigator.clipboard?.writeText(quoteTextForClipboard(payload));
      selectionHint.textContent = '引用内容已复制';
      window.setTimeout(showSelectionToolbar, 800);
    }

    askSelectionButton.addEventListener('mousedown', event => event.preventDefault());
    highlightSelectionButton.addEventListener('mousedown', event => event.preventDefault());
    copySelectionButton.addEventListener('mousedown', event => event.preventDefault());
    askSelectionButton.addEventListener('click', sendSelectionToBranch);
    highlightSelectionButton.addEventListener('click', highlightCurrentSelection);
    copySelectionButton.addEventListener('click', copyCurrentSelection);
    canvasSendButton.addEventListener('click', sendCanvasQuestion);
    toggleCanvasButton.addEventListener('click', toggleCanvasChat);
    openCanvasButton.addEventListener('click', () => openCanvasChat(true));
    sectionSelect.addEventListener('change', () => {
      const sectionIndex = Number(sectionSelect.value || 0);

    document.querySelectorAll('[data-layout-preset]').forEach(button => {
      button.addEventListener('click', () => setLayoutPreset(button.dataset.layoutPreset));
    });
    document.querySelectorAll('[data-reading-mode]').forEach(button => {

    });
    if (pageJumpInput) {
      pageJumpInput.addEventListener('focus', () => pageJumpInput.select());
      pageJumpInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();

    readerGrid.addEventListener('mousedown', startResize);

    clearQuoteButton.addEventListener('click', () => {

      renderQuotePreview();
      canvasHint.textContent = '已清除引用';

        sendCanvasQuestion();

    });
    pageRoot.addEventListener('scroll', scheduleScrollStateSave, { passive: true });
    noteRoot.addEventListener('scroll', scheduleScrollStateSave, { passive: true });
    noteRoot.addEventListener('click', (event) => {
      const button = event.target?.closest?.('[data-refresh-page],[data-edit-page],[data-save-edit-page],[data-cancel-edit-page]');
      if (!button) return;
      event.preventDefault();
      event.stopPropagation();

      } else if (button.dataset.editPage) {

    noteRoot.addEventListener('mouseup', () => window.setTimeout(showSelectionToolbar, 40));

    document.addEventListener('mousedown', (event) => {

          if (!selection || selection.isCollapsed) hideSelectionToolbar();

    function nearestScrollPanel(target) {
      if (target?.closest?.('.canvas-input')) return null;
      if (target?.closest?.('.page-jump-input')) return null;
      if (target?.closest?.('.note-editor')) return null;
      const element = target?.closest?.('.pages, .notes, .canvas-messages');

    }

    function scrollNoteEditor(event) {
      const editor = event.target?.closest?.('.note-editor');
      if (!editor) return false;
      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation();
      editor.scrollTop += event.deltaY;
      editor.scrollLeft += event.deltaX;
      return true;
    }

    function containedWheelScroll(event) {
      if (scrollNoteEditor(event)) return;
      const panel = nearestScrollPanel(event.target);
      if (!panel) return;
      if (panel === pageRoot && readingMode === 'paged') {
        handlePagedWheel(event);
        return;
      }
      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation();
      panel.scrollBy({ top: event.deltaY, left: event.deltaX, behavior: 'auto' });
    }

    window.addEventListener('wheel', containedWheelScroll, { capture: true, passive: false });
    document.addEventListener('wheel', containedWheelScroll, { capture: true, passive: false });

    if (fullscreenButton) {
      fullscreenButton.addEventListener('click', toggleFullscreen);
    }
    document.addEventListener('fullscreenchange', () => {
      const isFullscreen = Boolean(document.fullscreenElement);
      const exitedFullscreen = lastFullscreenState && !isFullscreen;
      lastFullscreenState = isFullscreen;
      syncFullscreenState(isFullscreen);
      preserveCurrentSlideAfterViewportChange(currentSlideNumber);
      if (exitedFullscreen) {
        scheduleParentReaderCenter({ behavior: 'auto', delay: 180 });
      }
    });
    window.addEventListener('resize', () => {
      if (document.fullscreenElement || document.body.classList.contains('reader-fullscreen')) {
        preserveCurrentSlideAfterViewportChange(currentSlideNumber);
      }
    });

    window.addEventListener('message', (event) => {
      if (event.data?.type !== 'streamlit:render') return;
      renderReader(event.data.args || {});
    });

    Streamlit.setComponentReady();
    Streamlit.setFrameHeight(850);
  </script>
</body>
</html>
