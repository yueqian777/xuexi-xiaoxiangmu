<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      },
      startup: {
        typeset: false
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <style>
    :root {
      --bg: #f2fbf8;
      --ink: #12323d;
      --muted: #5d7c86;
      --line: #cbe5ea;
      --accent: #18a58f;
      --accent-2: #55b7f4;
      --panel: #ffffff;
      --soft-green: #e9f9f2;
      --soft-blue: #edf8ff;
      --shadow: rgba(17, 89, 105, 0.13);
    }
    * { box-sizing: border-box; }
    html {
      height: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
    }
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #f5fffb, #eef8ff);
      color: var(--ink);
      font-family: "Microsoft YaHei", "Noto Sans SC", sans-serif;
      overscroll-behavior: none;
    }
    .frame {
      height: 100%;
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: var(--bg);
      box-shadow: 0 18px 45px var(--shadow);
    }
    body.reader-fullscreen .frame {
      height: 100vh !important;
      height: 100dvh !important;
      border-radius: 0;
    }
    .topbar {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: rgba(249, 255, 253, 0.96);
      border-bottom: 1px solid var(--line);
    }
    .title {
      font-weight: 800;
      letter-spacing: 0.02em;
    }
    .meta {
      color: var(--muted);
      font-size: 13px;
    }
    .current {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      min-width: 82px;
      height: 32px;
      padding: 0 8px;
      border: 1px solid #b9dde6;
      border-radius: 8px;
      background: #ffffff;
      color: var(--accent);
      font-weight: 800;
      box-shadow: 0 4px 12px rgba(24, 111, 130, 0.08);
    }
    .page-jump-input {
      width: 34px;
      border: 0;
      padding: 0;
      background: transparent;
      color: var(--accent);
      font: inherit;
      font-weight: 900;
      text-align: right;
      outline: none;
      appearance: textfield;
    }
    .page-jump-input::-webkit-outer-spin-button,
    .page-jump-input::-webkit-inner-spin-button {
      margin: 0;
      appearance: none;
    }
    .page-jump-separator {
      color: #7c9aa2;
      font-weight: 800;
    }
    .page-jump-total {
      min-width: 18px;
      color: #5d7780;
      font-weight: 800;
      text-align: left;
    }
    .layout-controls {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-right: 14px;
    }
    .layout-controls button {
      border: 1px solid #b9dde6;
      border-radius: 999px;
      padding: 6px 10px;
      background: #ffffff;
      color: #24606f;
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(24, 111, 130, 0.08);
    }
    .layout-controls button:hover {
      border-color: var(--accent);
      color: #087b70;
      background: var(--soft-green);
    }
    .mode-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-right: 8px;
      padding: 3px;
      border: 1px solid #b9dde6;
      border-radius: 999px;
      background: #f7fffd;
    }
    .mode-controls button {
      border: 0;
      border-radius: 999px;
      padding: 5px 10px;
      background: transparent;
      color: #4c7580;
      font: inherit;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }
    .mode-controls button.active {
      background: linear-gradient(135deg, #18a58f, #55b7f4);
      color: #ffffff;
      box-shadow: 0 5px 12px rgba(24, 128, 151, .17);
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-select {
      width: min(260px, 28vw);
      min-width: 160px;
      height: 32px;
      border: 1px solid #b9dde6;
      border-radius: 8px;
      padding: 0 9px;
      background: #ffffff;
      color: #24606f;
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      outline: none;
      box-shadow: 0 4px 12px rgba(24, 111, 130, 0.08);
    }
    .section-select:focus {
      border-color: var(--accent);
    }
    .section-select:disabled {
      color: #8aa3aa;
      background: #f5fbfd;
      cursor: not-allowed;
    }
    .fullscreen-btn {
      display: flex;
      align-items: center;
      border: 1px solid #b9dde6;
      border-radius: 999px;
      padding: 6px 10px;
      background: #ffffff;
      color: #24606f;
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(24, 111, 130, 0.08);
      transition: border-color .15s, color .15s, background .15s;
    }
    .fullscreen-btn:hover {
      border-color: var(--accent);
      color: #087b70;
      background: var(--soft-green);
    }
    .fullscreen-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    body.reader-fullscreen {
      overflow: hidden !important;
    }
    body.reader-fullscreen html {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden !important;
      height: 100vh !important;
      height: 100dvh !important;
    }
    body.reader-fullscreen body {
      overflow: hidden !important;
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body.reader-fullscreen .frame {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      border-radius: 0 !important;
      border: none !important;
      box-shadow: none !important;
      z-index: 99999 !important;
    }
    body:not(.reader-fullscreen) .frame {
      transition: none;
    }
    .grid {
      height: calc(100% - 58px);
      display: grid;
      grid-template-columns: minmax(260px, 1.15fr) 8px minmax(300px, 0.85fr) 8px minmax(330px, 0.55fr);
      transition: grid-template-columns .14s ease;
    }
    .pages, .notes {
      height: 100%;
      overflow-y: auto;
      scroll-behavior: smooth;
      overscroll-behavior: contain;
      touch-action: pan-y;
    }
    .pages {
      padding: 22px 24px 80px;
      background:
        radial-gradient(circle at 10% 10%, rgba(85,183,244,.16), transparent 28%),
        linear-gradient(180deg, #f3fbff, #eefaf6);
    }
    .pages.paged {
      padding: 28px 24px;
      scroll-snap-type: y mandatory;
      scroll-padding-block: 28px;
    }
    .page {
      margin: 0 auto 30px;
      max-width: 960px;
      padding: 12px;
      border-radius: 14px;
      border: 2px solid transparent;
      background: rgba(255,255,255,.56);
      box-shadow: 0 10px 28px rgba(20,85,98,.13);
      transition: border-color .18s, transform .18s, box-shadow .18s;
    }
    .pages.paged .page {
      min-height: calc(100% - 64px);
      height: calc(100% - 64px);
      width: 100%;
      max-width: none;
      margin: 32px auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
      scroll-snap-align: center;
      scroll-snap-stop: always;
    }
    .page.active {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 16px 38px rgba(24,165,143,.22);
    }
    .page-label {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      padding: 2px 4px 10px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }
    .page img {
      width: 100%;
      display: block;
      border-radius: 8px;
      background: #fff;
    }
    .page-visual {
      width: 100%;
    }
    .page-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 220px;
      border: 1px dashed #b9dde6;
      border-radius: 8px;
      background: #f8fffd;
      color: #5d7c86;
      font-size: 13px;
      font-weight: 800;
      text-align: center;
    }
    .pages.paged .page-visual {
      flex: 1;
      min-height: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .pages.paged .page img {
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .pages.paged .page-placeholder {
      height: 100%;
      min-height: 0;
    }
    .notes {
      padding: 22px 20px 80px;
      background: var(--panel);
    }
    .note {
      min-height: 260px;
      margin: 0 0 22px;
      padding: 18px 18px 20px;
      border: 1px solid var(--line);
      border-left: 5px solid transparent;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 8px 18px rgba(19,87,101,.08);
      transition: border-color .18s, background .18s;
      line-height: 1.72;
      font-size: 15px;
    }
    .note.active {
      border-left-color: var(--accent);
      background: #effbf7;
    }
    .note-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 10px;
    }
    .note h3 {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 18px;
    }
    .note-header h3 {
      margin: 0;
    }
    .note-actions,
    .note-edit-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 7px;
    }
    .note-action-button,
    .note-refresh {
      flex: 0 0 auto;
      border: 1px solid #b9dde6;
      border-radius: 999px;
      padding: 5px 10px;
      background: #f7fffd;
      color: #087b70;
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(24, 111, 130, 0.08);
    }
    .note-action-button:hover,
    .note-refresh:hover {
      border-color: var(--accent);
      background: var(--soft-green);
    }
    .note-action-button:disabled,
    .note-refresh:disabled {
      cursor: default;
      opacity: 0.72;
    }
    .note-save {
      background: var(--accent);
      color: #ffffff;
      border-color: var(--accent);
    }
    .note-cancel {
      background: #eef8ff;
      color: #1f6b86;
    }
    .note-meta {
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 12px;
    }
    .note-context {
      display: grid;
      gap: 5px;
      margin: 0 0 12px;
      padding: 9px 10px;
      border: 1px solid #cbece3;
      border-radius: 8px;
      background: #f3fffb;
      color: #2b6971;
      font-size: 13px;
      line-height: 1.45;
    }
    .note-context-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .note-chip {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      min-height: 22px;
      padding: 3px 7px;
      border-radius: 999px;
      background: #e5f7ff;
      color: #1e6882;
      font-size: 12px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }
    .note-context-text {
      overflow-wrap: anywhere;
    }
    .note-body {
      overflow-wrap: anywhere;
    }
    .note-body.lazy {
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed #cbece3;
      border-radius: 8px;
      background: #f8fffd;
      color: #5d7c86;
      font-size: 13px;
      font-weight: 800;
      text-align: center;
    }
    .note-edit-panel {
      display: none;
      margin-top: 12px;
    }
    .note.editing .note-body {
      display: none;
    }
    .note.editing .note-edit-panel {
      display: block;
    }
    .note-editor {
      width: 100%;
      min-height: 380px;
      resize: vertical;
      border: 1px solid #b9dde6;
      border-radius: 8px;
      padding: 12px;
      background: #ffffff;
      color: var(--ink);
      font: inherit;
      font-family: "Microsoft YaHei", "Noto Sans SC", sans-serif;
      line-height: 1.65;
      outline: none;
      overflow-y: auto;
      overscroll-behavior: contain;
    }
    .note-editor:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(24, 165, 143, 0.14);
    }
    .reader-highlight {
      padding: 0 2px;
      border-radius: 3px;
      background: #fff09a;
      box-shadow: 0 0 0 1px rgba(219, 165, 0, 0.2);
    }
    .note-body h1,
    .note-body h2,
    .note-body h3,
    .note-body h4 {
      margin: 16px 0 8px;
      color: #0f7f78;
      line-height: 1.35;
    }
    .note-body h1 { font-size: 21px; }
    .note-body h2 { font-size: 19px; }
    .note-body h3 { font-size: 17px; }
    .note-body p { margin: 8px 0; }
    .note-body ul,
    .note-body ol {
      margin: 8px 0 10px;
      padding-left: 24px;
    }
    .note-body li { margin: 4px 0; }
    .note-body blockquote {
      margin: 12px 0;
      padding: 8px 12px;
      border-left: 4px solid #68c9ae;
      background: #ecfbf5;
      color: #365967;
    }
    .note-body pre {
      margin: 12px 0;
      padding: 12px;
      overflow-x: auto;
      border-radius: 10px;
      background: #12323d;
      color: #eafffb;
      line-height: 1.55;
    }
    .note-body code {
      padding: 2px 5px;
      border-radius: 5px;
      background: #e7f7f4;
      color: #087b70;
      font-family: "Cascadia Code", "Consolas", monospace;
      font-size: 0.92em;
    }
    .note-body pre code {
      padding: 0;
      background: transparent;
      color: inherit;
    }
    .note-body table {
      width: 100%;
      margin: 12px 0;
      border-collapse: collapse;
      display: block;
      overflow-x: auto;
      font-size: 14px;
    }
    .note-body th,
    .note-body td {
      border: 1px solid #cbe5ea;
      padding: 7px 9px;
      text-align: left;
      vertical-align: top;
    }
    .note-body th {
      background: #e7f7ff;
      color: #155f7a;
    }
    .note-body hr {
      border: 0;
      border-top: 1px solid var(--line);
      margin: 16px 0;
    }
    .note-body mjx-container {
      overflow-x: auto;
      overflow-y: hidden;
      max-width: 100%;
      padding: 2px 0;
    }
    .selection-toolbar {
      position: fixed;
      z-index: 9999;
      display: none;
      align-items: center;
      gap: 8px;
      max-width: min(560px, calc(100vw - 24px));
      padding: 9px 10px;
      border: 1px solid rgba(31, 145, 154, 0.22);
      border-radius: 999px;
      background: rgba(247, 255, 253, 0.98);
      color: var(--ink);
      box-shadow: 0 12px 34px rgba(18, 97, 112, 0.18);
      font-size: 13px;
    }
    .selection-toolbar.show { display: flex; }
    body.reader-fullscreen .selection-toolbar {
      z-index: 100001;
    }
    .selection-toolbar button {
      border: 0;
      border-radius: 999px;
      padding: 7px 11px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }
    .selection-toolbar button.secondary {
      background: #e6f6ff;
      color: #1f6b86;
    }
    .selection-toolbar span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #557783;
    }
    .canvas-chat {
      height: 100%;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      background:
        linear-gradient(180deg, rgba(250,255,253,.98), rgba(236,248,255,.98)),
        var(--panel);
      box-shadow: inset 10px 0 28px rgba(24, 119, 140, 0.06);
      overflow: hidden;
    }
    .canvas-chat.collapsed {
      display: flex;
      align-items: stretch;
      justify-content: center;
      background: linear-gradient(180deg, #eaf8ff, #e9fbf3);
    }
    .canvas-chat.collapsed .canvas-chat-header,
    .canvas-chat.collapsed .canvas-context,
    .canvas-chat.collapsed .canvas-messages,
    .canvas-chat.collapsed .canvas-compose {
      display: none;
    }
    .canvas-collapsed-rail {
      display: none;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 12px 6px;
    }
    .canvas-chat.collapsed .canvas-collapsed-rail {
      display: flex;
    }
    .canvas-collapsed-rail button {
      width: 34px;
      min-height: 170px;
      border: 1px solid #a8dce4;
      border-radius: 999px;
      background: #ffffff;
      color: #087b70;
      font-weight: 900;
      cursor: pointer;
      writing-mode: vertical-rl;
      letter-spacing: .08em;
      box-shadow: 0 10px 22px rgba(20, 105, 128, 0.14);
    }
    .canvas-chat-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--line);
    }
    .canvas-chat-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .canvas-chat-title {
      margin: 0;
      color: #087b70;
      font-size: 16px;
      font-weight: 900;
    }
    .canvas-toggle {
      border: 1px solid #b9dde6;
      border-radius: 999px;
      padding: 5px 9px;
      background: #ffffff;
      color: #24606f;
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }
    .canvas-chat-meta {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .canvas-context {
      padding: 10px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(235, 249, 246, 0.86);
      color: #355d68;
      font-size: 13px;
      line-height: 1.5;
    }
    .canvas-messages {
      min-height: 0;
      overflow-y: auto;
      padding: 14px 14px 18px;
      overscroll-behavior: contain;
    }
    .canvas-empty {
      margin: 16px 4px;
      padding: 14px;
      border: 1px dashed #cdb793;
      border-color: #a9d8e5;
      border-radius: 14px;
      color: #5d7c86;
      background: rgba(255,255,255,.48);
      font-size: 13px;
      line-height: 1.65;
    }
    .chat-turn {
      margin-bottom: 14px;
    }
    .chat-question,
    .chat-answer {
      padding: 11px 12px;
      border-radius: 14px;
      line-height: 1.62;
      font-size: 14px;
      overflow-wrap: anywhere;
    }
    .chat-question {
      margin-left: 26px;
      background: linear-gradient(135deg, #18a58f, #43a9e8);
      color: #ffffff;
      border-bottom-right-radius: 5px;
    }
    .chat-answer {
      margin-top: 8px;
      margin-right: 22px;
      border: 1px solid #cbe5ea;
      background: #ffffff;
      color: var(--ink);
      border-bottom-left-radius: 5px;
    }
    .chat-answer h1,
    .chat-answer h2,
    .chat-answer h3,
    .chat-answer h4 {
      margin: 12px 0 6px;
      color: #0f7f78;
      line-height: 1.35;
    }
    .chat-answer p { margin: 7px 0; }
    .chat-answer ul,
    .chat-answer ol {
      margin: 7px 0 9px;
      padding-left: 22px;
    }
    .chat-answer code {
      padding: 2px 5px;
      border-radius: 5px;
      background: #e7f7f4;
      color: #087b70;
      font-family: "Cascadia Code", "Consolas", monospace;
      font-size: 0.92em;
    }
    .chat-turn-meta {
      margin: 6px 2px 0;
      color: #6f8c96;
      font-size: 11px;
    }
    .canvas-compose {
      padding: 12px 14px 14px;
      border-top: 1px solid var(--line);
      background: rgba(250, 255, 253, 0.98);
    }
    .quote-preview {
      display: none;
      margin-bottom: 8px;
      padding: 9px 10px;
      border: 1px solid #a8dce4;
      border-radius: 12px;
      background: #edf8ff;
      color: #1f5d70;
      font-size: 12px;
      line-height: 1.45;
    }
    .quote-preview.show {
      display: block;
    }
    .quote-preview button {
      float: right;
      border: 0;
      background: transparent;
      color: #087b70;
      cursor: pointer;
      font-weight: 900;
    }
    .canvas-input {
      width: 100%;
      min-height: 82px;
      resize: vertical;
      padding: 10px 11px;
      border: 1px solid #b9dde6;
      border-radius: 13px;
      background: #ffffff;
      color: var(--ink);

  <script>
    const Streamlit = {
