            <div class="note-actions">
              <button type="button" class="note-action-button" data-edit-page="${page.slideNumber}" title="手动修改本页讲解">编辑讲解</button>
              <button type="button" class="note-refresh" data-refresh-page="${page.slideNumber}" title="重新渲染本页 Markdown 和公式">刷新显示</button>
            </div>
          </div>
          <div class="note-meta">${escapeHtml(page.model || '未生成')} ${page.createdAt ? '· ' + escapeHtml(page.createdAt) : ''}</div>
          ${renderPageContext(page)}
          ${renderNoteBody(page, shouldHydrateNote(Number(page.slideNumber), targetSlide))}
          <div class="note-edit-panel">
            <textarea class="note-editor" data-note-slide="${page.slideNumber}" spellcheck="false">${shouldHydrateNote(Number(page.slideNumber), targetSlide) ? escapeHtml(page.explanation || '') : ''}</textarea>
            <div class="note-edit-actions">
              <button type="button" class="note-action-button note-cancel" data-cancel-edit-page="${page.slideNumber}">取消</button>
              <button type="button" class="note-action-button note-save" data-save-edit-page="${page.slideNumber}">保存修改</button>
            </div>
          </div>
        </article>
      `).join('');
      updateBookmarkControls();

      observer = new IntersectionObserver((entries) => {
        if (Date.now() < suppressObserverUntil) return;
        const visible = entries
          .filter(entry => entry.isIntersecting)
          .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
        if (!visible) return;
        setActive(visible.target.dataset.page);
      }, {
        root: pageRoot,
        threshold: [0.35, 0.5, 0.65, 0.8],
      });

      document.querySelectorAll('.page').forEach(page => observer.observe(page));
      if (pages.length) {
        setActive(targetSlide, {
          behavior: 'auto',
          noteBehavior: 'auto',
          scrollNote: !isSameDeckRefresh,
          immediateNearbyContent: true,
        });
      }
      window.setTimeout(() => {
        const storedMatchesTarget = Boolean(stored && Number(stored.currentSlide || 0) === Number(targetSlide));
        if (readingMode === 'paged' || !storedMatchesTarget) {
          centerPage(targetSlide, 'auto');
        } else {
          pageRoot.scrollTop = stored.pageScroll || 0;
        }
        if (isSameDeckRefresh) {
          restoreNoteAnchor(restoreScrollAfterRender.noteAnchor);
        } else if (storedMatchesTarget) {
          noteRoot.scrollTop = stored.noteScroll || 0;
        }
        renderChatForPage(currentSlideNumber);
      }, 80);
      const hydratedBodies = Array.from(noteRoot.querySelectorAll('.note-body[data-hydrated="1"]'));
      typesetTargets([...hydratedBodies, canvasMessages]).then(typesetDone => {
        if (typesetDone !== false) applyMarkdownSourceMapsForBodies(hydratedBodies);
      });
      if (!hasCenteredOnEntry && pages.length) {
        hasCenteredOnEntry = true;
        scheduleParentReaderCenter({
          behavior: 'auto',
          delay: 160,
          skipIfAboveViewport: true,
        });
      }
    }

    function clipText(value, limit) {
      const text = String(value ?? '').replace(/\s+/g, ' ').trim();
      if (text.length <= limit) return text;
      return text.slice(0, limit).trim() + '...';
    }

    function clipRawText(value, limit) {
      const text = String(value ?? '').trim();
      if (text.length <= limit) return text;
      return text.slice(0, limit).trim() + '...';
    }

    function nodeElement(node) {
      if (!node) return null;
      return node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;
    }

    function buildChatSelectionPayloadFromRange(range, startElement, endElement, selectedText) {
      const answerBody = startElement?.closest?.('.chat-answer-body');
      if (!answerBody || !endElement || !answerBody.contains(endElement)) return null;
      if (startElement?.closest?.('textarea, input') || endElement?.closest?.('textarea, input')) return null;
      const questionId = Number(answerBody.dataset.questionId || 0);
      const item = questionById(questionId);
      if (!item) return null;

      const beforeRange = document.createRange();
      beforeRange.selectNodeContents(answerBody);
      beforeRange.setEnd(range.startContainer, range.startOffset);
      const beforeRaw = beforeRange.toString();

      const afterRange = document.createRange();
      afterRange.selectNodeContents(answerBody);
      afterRange.setStart(range.endContainer, range.endOffset);
      const afterRaw = afterRange.toString();

      if (!noteBodySourceMaps.get(answerBody)) {
        applyMarkdownSourceMap(answerBody, item.answer);
      }
      const sourceLocation = sourceLocationFromSelectionRange(answerBody, range);
      const payload = {
        action: 'branch_quote',
        token: `${Date.now()}_${Math.random().toString(36).slice(2)}`,
        deckId,
        slideNumber: Number(answerBody.dataset.slideNumber || currentSlideNumber),
        slideTitle: `插问 #${questionId}`,
        sourceKind: 'question_answer',
        questionId,
        sourceQuestionId: questionId,
        parentQuestionId: item.parentQuestionId || null,
        rootQuestionId: item.rootQuestionId || questionId,
        depth: Number(item.depth || 0),
        selectedText: clipText(selectedText, 1200),
        selectedTextRaw: clipRawText(selectedText, 1200),
        contextBefore: clipText(collapsedSearchText(beforeRaw).slice(-700), 700),
        contextAfter: clipText(collapsedSearchText(afterRaw).slice(0, 700), 700),
        selectionStartOffset: collapsedSearchText(beforeRaw).length,
      };
      if (sourceLocation) {
        payload.sourceStart = sourceLocation.start;
        payload.sourceEnd = sourceLocation.end;
      }
      const startHighlight = startElement?.closest?.('.reader-highlight');
      const endHighlight = endElement?.closest?.('.reader-highlight');
      const markdownState = markdownSelectionHighlightState(String(item.answer || ''), payload);
      payload.isHighlighted = Boolean(
        markdownState.isHighlighted || (startHighlight && startHighlight === endHighlight)
      );
      return payload;
    }

    function buildSelectionPayload() {
      const selection = window.getSelection();
      if (!selection || selection.isCollapsed || selection.rangeCount === 0) return null;
      const selectedText = selection.toString().trim();
      if (selectedText.length < 2) return null;

      const range = selection.getRangeAt(0);
      const startElement = nodeElement(range.startContainer);
      const endElement = nodeElement(range.endContainer);
      if (startElement?.closest?.('.note-editor') || endElement?.closest?.('.note-editor')) return null;
      const chatPayload = buildChatSelectionPayloadFromRange(range, startElement, endElement, selectedText);
      if (chatPayload) return chatPayload;
      const note = startElement?.closest?.('.note');
      if (!note || !noteRoot.contains(note) || !endElement || !note.contains(endElement)) return null;

      const noteBody = note.querySelector('.note-body');
      if (!noteBody) return null;
      if (!noteBody.contains(startElement) || !noteBody.contains(endElement)) return null;

      const beforeRange = document.createRange();
      beforeRange.selectNodeContents(noteBody);
      beforeRange.setEnd(range.startContainer, range.startOffset);
      const beforeRaw = beforeRange.toString();

      const afterRange = document.createRange();
      afterRange.selectNodeContents(noteBody);
      afterRange.setStart(range.endContainer, range.endOffset);
      const afterRaw = afterRange.toString();

      const before = collapsedSearchText(beforeRaw);
      const after = collapsedSearchText(afterRaw);
      const selectionStartOffset = before.length;
      const slideNumber = Number(note.dataset.page);
      const page = pages.find(item => Number(item.slideNumber) === slideNumber) || {};
      if (!noteBodySourceMaps.get(noteBody)) {
        applyMarkdownSourceMap(noteBody, page.explanation);
      }
      const sourceLocation = sourceLocationFromSelectionRange(noteBody, range);
      const startHighlight = startElement?.closest?.('.reader-highlight');
      const endHighlight = endElement?.closest?.('.reader-highlight');
      const payload = {
        action: 'branch_quote',
        token: `${Date.now()}_${Math.random().toString(36).slice(2)}`,
        deckId,
        slideNumber,
        slideTitle: page.title || `第 ${slideNumber} 页`,
        sourceKind: 'explanation',
        selectedText: clipText(selectedText, 1200),
        selectedTextRaw: clipRawText(selectedText, 1200),
        contextBefore: clipText(before.slice(-700), 700),
        contextAfter: clipText(after.slice(0, 700), 700),
        selectionStartOffset,
      };
      if (sourceLocation) {
        payload.sourceStart = sourceLocation.start;
        payload.sourceEnd = sourceLocation.end;
      }
      const markdownState = markdownSelectionHighlightState(String(page.explanation || ''), payload);
      payload.isHighlighted = Boolean(
        markdownState.isHighlighted || (startHighlight && startHighlight === endHighlight)
      );
      return payload;
    }

    function showSelectionToolbar() {
      const payload = buildSelectionPayload();
      if (!payload) {
        hideSelectionToolbar();
        return;
      }
      currentSelectionPayload = payload;
      const selection = window.getSelection();
      const rect = selection.getRangeAt(0).getBoundingClientRect();
      const left = Math.min(Math.max(8, rect.left), Math.max(8, window.innerWidth - 570));
      const top = Math.max(8, rect.top - 52);
      selectionToolbar.style.left = `${left}px`;
      selectionToolbar.style.top = `${top}px`;
      highlightSelectionButton.textContent = payload.isHighlighted ? '取消高亮' : '高亮';
      highlightSelectionButton.title = payload.isHighlighted ? '取消所选文字的 Markdown 高亮' : '用 Markdown 高亮所选文字';
      selectionHint.textContent = `第 ${payload.slideNumber} 页：${clipText(payload.selectedText, 42)}`;
      selectionToolbar.classList.add('show');
    }

    function hideSelectionToolbar() {
      currentSelectionPayload = null;
      selectionToolbar.classList.remove('show');
    }

    function quoteTextForClipboard(payload) {
      return [
        `引用自第 ${payload.slideNumber} 页：${payload.slideTitle}`,
        '',
        payload.selectedText,
        '',
        '前文上下文：',
        payload.contextBefore || '无',
        '',
        '后文上下文：',
        payload.contextAfter || '无',
      ].join('\n');
    }

    function renderQuotePreview() {
      if (!currentChatQuote) {
        quotePreview.classList.remove('show');
        quotePreviewText.textContent = '';
        return;
      }
      const label = currentChatQuote.sourceKind === 'question_answer'
        ? `已引用插问 #${currentChatQuote.questionId}`
        : `已引用第 ${currentChatQuote.slideNumber} 页`;
      quotePreviewText.textContent = `${label}：${clipText(currentChatQuote.selectedText, 140)}`;
      quotePreview.classList.add('show');
    }

    function renderChatQuestion(item) {
      const questionHtml = escapeHtml(item.question || '').replaceAll('\n', '<br>');
      const quoteText = String(item.quoteText || '').trim();
      const quoteHtml = quoteText
        ? `<div class="chat-quote"><div class="chat-quote-label">引用内容</div><div>${escapeHtml(quoteText).replaceAll('\n', '<br>')}</div></div>`
        : '';
      return `<div class="chat-question"><div class="chat-question-text">${questionHtml}</div>${quoteHtml}</div>`;
    }

    function renderChatTurn(item, options) {
      options = options || {};
      const questionId = questionIdForItem(item);
      const isChild = Number(item.parentQuestionId || 0) > 0;
      return `
        <div class="chat-turn ${isChild ? 'child-question' : ''}" data-question-id="${questionId || ''}" data-depth="${Number(item.depth || 0)}">
          ${renderChatQuestion(item)}
          <div class="chat-answer">
            <div class="chat-answer-body" data-question-id="${questionId || ''}" data-slide-number="${currentSlideNumber}">${renderMarkdown(item.answer || '')}</div>
          </div>
          <div class="chat-turn-meta">${escapeHtml(item.model || '未知模型')} ${item.createdAt ? '· ' + escapeHtml(item.createdAt) : ''}</div>
          ${options.inChildPanel ? '' : `<div class="chat-turn-actions"><button type="button" data-open-child-chat="${questionId || ''}">子插问</button></div>`}
        </div>
      `;
    }

    function renderChatForPage(slideNumber, options = {}) {
      const page = pageForSlide(slideNumber);
      if (!page) {
        canvasContext.textContent = '当前上下文：未识别页面';
        canvasMessages.innerHTML = '<div class="canvas-empty">还没有可用上下文。</div>';
        return;
      }
      const section = sectionForSlide(slideNumber);
      const contextParts = [
        `第 ${page.slideNumber} 页`,
        page.title || '未命名页面',
        section ? `目录块：${section.title || '未命名目录块'}` : '',
        page.pageType || '',
      ].filter(Boolean);
      canvasContext.textContent = `当前上下文：${contextParts.join(' · ')}`;
      const messages = Array.isArray(page.questions) ? page.questions : [];
      const rootMessages = messages.filter(item => !Number(item.parentQuestionId || 0));
      if (!rootMessages.length) {
        canvasMessages.innerHTML = `
          <div class="canvas-empty">
            本页还没有插问。你可以直接围绕当前 PPT 页面和右侧讲解提问；回答会保存到这一页，不会覆盖主线讲解。
          </div>
        `;
        return;
      }
      const previousScrollTop = canvasMessages.scrollTop;
      canvasMessages.innerHTML = rootMessages.map(item => [
        renderChatTurn(item),
        ...messages
          .filter(child => Number(child.rootQuestionId || child.id || 0) === Number(item.rootQuestionId || item.id || 0)
            && Number(child.parentQuestionId || 0) > 0)
          .map(child => renderChatTurn(child)),
      ].join('')).join('');
      if (options.preserveScroll) {
        canvasMessages.scrollTop = previousScrollTop;
      } else {
        canvasMessages.scrollTop = canvasMessages.scrollHeight;
      }
      typesetTargets([canvasMessages]).then(typesetDone => {
        if (typesetDone !== false) applyChatSourceMaps(canvasMessages);
      });
      renderChildQuestionStack();
    }

    function sendCanvasQuestion() {
      const question = canvasInput.value.trim();
      if (!question) {
        canvasHint.textContent = '请先输入问题';
        canvasInput.focus();
        return;
      }
      const page = pageForSlide(currentSlideNumber);
      if (!page) {
        canvasHint.textContent = '当前页上下文不可用';
        return;
      }
      saveScrollState();
      canvasSendButton.disabled = true;
      canvasSendButton.textContent = '发送中...';
      canvasHint.textContent = `正在询问第 ${currentSlideNumber} 页`;
      Streamlit.setComponentValue({
        action: 'canvas_question',
        token: `${Date.now()}_${Math.random().toString(36).slice(2)}`,
        deckId,
        slideNumber: currentSlideNumber,
        question,
        quote: currentChatQuote,
        parentQuestionId: currentChatQuote?.sourceKind === 'question_answer' ? currentChatQuote.questionId : null,
      });
    }

    function sendChildQuestion(layerId) {
      const layer = childChatLayers.find(item => item.layerId === layerId);
      if (!layer) return;
      const input = childChatStack.querySelector(`[data-child-input="${layerId}"]`);
      const question = String(input?.value || '').trim();
      if (!question) {
        input?.focus();
        return;
      }
      childPanelScrollToBottomLayerId = layerId;
      Streamlit.setComponentValue({
        action: 'canvas_question',
        token: `${Date.now()}_${Math.random().toString(36).slice(2)}`,
        deckId,
        slideNumber: currentSlideNumber,
        question,
        parentQuestionId: layer.parentQuestionId,
        quote: layer.quote,
      });
    }

    function openChildChatFromQuote(payload) {
      if (!payload || payload.sourceKind !== 'question_answer' || !payload.questionId) return false;
      const depth = Number(payload.depth || questionById(payload.questionId)?.depth || 0) + 1;
      if (depth > 5) {
        selectionHint.textContent = '子插问最多支持 5 级';
        return true;
      }
      const anchorQuestionId = Number(payload.questionId);
      const childScrollPositions = childLayerScrollPositions();
      const keep = childChatLayers.filter(layer => Number(layer.depth || 0) < depth);
      const layer = {
        layerId: `${anchorQuestionId}_${Date.now()}_${Math.random().toString(36).slice(2)}`,
        parentQuestionId: anchorQuestionId,
        depth,
        quote: payload,
      };
      applyReaderLayoutChangeWithAnchors(() => {
        childChatLayers = [...keep, layer].slice(-5);
        renderChildQuestionStack({ scrollPositions: childScrollPositions });
      });
      return true;
    }

    function closeChildLayer(layerId) {
      const index = childChatLayers.findIndex(layer => layer.layerId === layerId);
      if (index < 0) return;
      const childScrollPositions = childLayerScrollPositions();
      const layer = childChatLayers[index];
      applyReaderLayoutChangeWithAnchors(() => {
        childChatLayers = childChatLayers.slice(0, index);
        renderChildQuestionStack({ scrollPositions: childScrollPositions });
      });
      sendQuestionThreadMerge(layer.parentQuestionId);
    }

    function scrollChatToBottom(container) {
      if (!container) return;
      container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
    }

    function scrollChildPanelToQuestionTop(panel, questionId) {
      const targetId = Number(questionId || 0);
      if (!panel || !targetId) return false;
      const turn = panel.querySelector?.(`[data-question-id="${targetId}"]`);
      if (!turn) return false;
      let top = 0;
      if (typeof turn.getBoundingClientRect === 'function' && typeof panel.getBoundingClientRect === 'function') {
        const turnRect = turn.getBoundingClientRect();
        const panelRect = panel.getBoundingClientRect();
        top = Number(panel.scrollTop || 0) + Number(turnRect.top || 0) - Number(panelRect.top || 0);
      } else {
        top = Number(turn.offsetTop || 0) - Number(panel.offsetTop || 0);
      }
      panel.scrollTop = Math.max(0, top);
      return true;
    }

    function shouldSubmitInputOnEnter(event) {
      return (
        event &&
        event.key === 'Enter' &&
        !event.shiftKey &&
        !event.ctrlKey &&
        !event.metaKey &&
        !event.altKey &&
        !event.isComposing &&
        event.keyCode !== 229
      );
    }

    function submitInputOnEnter(event, submitAction) {
      if (!shouldSubmitInputOnEnter(event)) return false;
      event.preventDefault();
      event.stopPropagation();
      submitAction();
      return true;
    }

    function childLayerScrollPositions() {
      const positions = new Map();
      if (!childChatStack) return positions;
      childChatStack.querySelectorAll('.child-chat-messages').forEach(panel => {
        const layerId = String(panel.dataset.childMessages || '');
        if (layerId) positions.set(layerId, panel.scrollTop);
      });
      return positions;
    }

    function restoreReaderScrollPositions(noteAnchor, pageScroll, chatScroll) {
      const restore = () => {
        pageRoot.scrollTop = pageScroll;
        restoreNoteAnchor(noteAnchor);
        canvasMessages.scrollTop = chatScroll;
      };
      window.requestAnimationFrame(() => {
        restore();
        window.requestAnimationFrame(restore);
      });
      [80, 180, 360].forEach(delay => window.setTimeout(restore, delay));
    }

    function renderChildQuestionStack(options) {
      if (!childChatStack) return;
      options = options || {};
      const scrollPositions = options.scrollPositions || childLayerScrollPositions();
      const forceBottomLayerId = String(options.forceBottomLayerId || childPanelScrollToBottomLayerId || '');
      const focusQuestionIdsByLayer = new Map();
      childChatStack.innerHTML = childChatLayers.map(layer => {
        const parent = questionById(layer.parentQuestionId);
        const children = childQuestionsFor(layer.parentQuestionId);
        if (forceBottomLayerId && String(layer.layerId) === forceBottomLayerId && children.length) {
          focusQuestionIdsByLayer.set(String(layer.layerId), questionIdForItem(children[children.length - 1]));
        }
        const messagesHtml = children.length
          ? children.map(item => renderChatTurn(item, { inChildPanel: true })).join('')
          : '<div class="canvas-empty">还没有子插问。</div>';
        return `
          <aside class="child-chat-panel" data-child-layer="${layer.layerId}">
            <header class="child-chat-header">
              <div class="child-chat-header-row">
                <h3 class="child-chat-title">子插问</h3>
                <button type="button" class="child-chat-bottom" data-child-bottom="${layer.layerId}" title="滚到最下">↓</button>
                <button type="button" class="child-chat-close" data-child-close="${layer.layerId}">关闭</button>
              </div>
              <div class="child-chat-meta">引用插问 #${escapeHtml(layer.parentQuestionId)} · ${escapeHtml(clipText(parent?.question || '', 42))}</div>
            </header>
            <div class="child-chat-messages" data-child-messages="${layer.layerId}">${messagesHtml}</div>
            <div class="child-chat-compose">
              <div class="quote-preview show"><div>${escapeHtml(clipText(layer.quote?.selectedText || '', 160))}</div></div>
              <textarea class="child-chat-input" data-child-input="${layer.layerId}" placeholder="继续围绕这段回答提问"></textarea>
              <div class="child-chat-actions">
                <span class="canvas-hint">回答会保存到当前 0 级插问下</span>
                <button type="button" class="child-chat-send" data-child-send="${layer.layerId}">问当前模型</button>
              </div>
            </div>
          </aside>
        `;
      }).join('');
      childChatStack.querySelectorAll('.child-chat-messages').forEach(panel => {
        const layerId = String(panel.dataset.childMessages || '');
        if (forceBottomLayerId && layerId === forceBottomLayerId) {
          const focused = scrollChildPanelToQuestionTop(panel, focusQuestionIdsByLayer.get(layerId));
          if (!focused) panel.scrollTop = panel.scrollHeight;
        } else if (scrollPositions.has(layerId)) {
          panel.scrollTop = scrollPositions.get(layerId);
        } else {
          panel.scrollTop = panel.scrollHeight;
        }
      });
      if (forceBottomLayerId && childPanelScrollToBottomLayerId === forceBottomLayerId) {
        childPanelScrollToBottomLayerId = null;
      }
      typesetTargets([childChatStack]).then(typesetDone => {
        if (typesetDone !== false) applyChatSourceMaps(childChatStack);
      });
    }

    function sendSelectionToBranch() {
      const payload = currentSelectionPayload || buildSelectionPayload();
      if (!payload) return;
      if (openChildChatFromQuote(payload)) {
        currentChatQuote = null;
        hideSelectionToolbar();
        window.getSelection()?.removeAllRanges();
        return;
      }
      currentChatQuote = payload;
      renderQuotePreview();
      setActive(payload.slideNumber, {
        scrollPage: true,
        scrollNote: false,
        behavior: 'auto',
        immediateNearbyContent: true,
        skipSave: true,
      });
      openCanvasChat(true);
      centerQuoteAfterLayoutChange(payload);
      canvasInput.focus();
      canvasHint.textContent = '已引用选中文本，将随下一次提问发送';
      selectionHint.textContent = '已引用到侧边插问栏';
      selectionToolbar.classList.remove('show');
    }

    function handlePagedWheel(event) {
      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation();
      const now = Date.now();
      pageWheelDelta += event.deltaY;
      if (Math.abs(pageWheelDelta) < 90 || now - lastPageSwitchAt < 260) return;
      const direction = pageWheelDelta > 0 ? 1 : -1;
      pageWheelDelta = 0;
      lastPageSwitchAt = now;
      navigateSlide(direction);
    }

    function handleReaderKeydown(event) {
      const target = event.target;
      const isEditing = target?.closest?.('textarea, input, select, button, [contenteditable="true"]');
      if (isEditing) return;
      if (readingMode !== 'paged') return;
      const key = event.key;
      if (key === 'ArrowDown' || key === 'PageDown' || (key === ' ' && !event.shiftKey)) {
        event.preventDefault();
        event.stopPropagation();
        navigateSlide(1);
      } else if (key === 'ArrowUp' || key === 'PageUp' || (key === ' ' && event.shiftKey)) {
        event.preventDefault();
        event.stopPropagation();
        navigateSlide(-1);
      } else if (key === 'Home') {
        event.preventDefault();
        event.stopPropagation();
        if (pages.length) setActive(Number(pages[0].slideNumber), { scrollPage: true, behavior: 'smooth' });
      } else if (key === 'End') {
        event.preventDefault();
        event.stopPropagation();
        if (pages.length) setActive(Number(pages[pages.length - 1].slideNumber), { scrollPage: true, behavior: 'smooth' });
      }
    }

    function copyCurrentSelection() {
      const payload = currentSelectionPayload || buildSelectionPayload();
      if (!payload) return;
      navigator.clipboard?.writeText(quoteTextForClipboard(payload));
      selectionHint.textContent = '引用内容已复制';
      window.setTimeout(showSelectionToolbar, 800);
    }

    askSelectionButton.addEventListener('mousedown', event => event.preventDefault());
    highlightSelectionButton.addEventListener('mousedown', event => event.preventDefault());
    copySelectionButton.addEventListener('mousedown', event => event.preventDefault());
    askSelectionButton.addEventListener('click', sendSelectionToBranch);
    highlightSelectionButton.addEventListener('click', highlightCurrentSelection);
    copySelectionButton.addEventListener('click', copyCurrentSelection);
    canvasSendButton.addEventListener('click', sendCanvasQuestion);
    canvasScrollBottomButton.addEventListener('click', () => scrollChatToBottom(canvasMessages));
    toggleCanvasButton.addEventListener('click', toggleCanvasChat);
    openCanvasButton.addEventListener('click', () => openCanvasChat(true));
    if (bookmarkMenuButton) {
      bookmarkMenuButton.addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();
        toggleBookmarkPanel();
      });
    }
    if (bookmarkPopover) {
      bookmarkPopover.addEventListener('click', (event) => {
        const input = event.target?.closest?.('[data-bookmark-title]');
        if (input) {
          event.stopPropagation();
          return;
        }
        const jumpTarget = event.target?.closest?.('[data-bookmark-jump],[data-bookmark-row]');
        if (!jumpTarget) return;
        event.preventDefault();
        event.stopPropagation();
        const slideNumber = Number(jumpTarget.dataset.bookmarkJump || jumpTarget.dataset.bookmarkRow || 0);
        jumpToBookmark(slideNumber);
      });
      bookmarkPopover.addEventListener('change', (event) => {
        const input = event.target?.closest?.('[data-bookmark-title]');
        if (!input) return;
        renameBookmark(Number(input.dataset.bookmarkTitle || 0), input.value);
      });
      bookmarkPopover.addEventListener('keydown', (event) => {
        const input = event.target?.closest?.('[data-bookmark-title]');
        if (input && event.key === 'Enter') {
          event.preventDefault();
          renameBookmark(Number(input.dataset.bookmarkTitle || 0), input.value);
          input.blur();
        } else if (input && event.key === 'Escape') {
          event.preventDefault();
          const page = pageForSlide(Number(input.dataset.bookmarkTitle || 0));
          input.value = bookmarkTitleForPage(page);
          input.blur();
        } else if (event.key === 'Escape') {
          event.preventDefault();
          closeBookmarkPanel();
        }
      });
    }
    sectionSelect.addEventListener('change', () => {
      const sectionIndex = Number(sectionSelect.value || 0);
      const section = sections.find(item => Number(item.sectionIndex) === sectionIndex);
      if (!section) return;
      setActive(Number(section.startSlide || 1), { scrollPage: true, behavior: 'smooth' });
    });
    document.querySelectorAll('[data-layout-preset]').forEach(button => {
      button.addEventListener('click', () => setLayoutPreset(button.dataset.layoutPreset));
    });
    document.querySelectorAll('[data-reading-mode]').forEach(button => {
      button.addEventListener('click', () => setReadingMode(button.dataset.readingMode));
    });
    if (pageJumpInput) {
      pageJumpInput.addEventListener('focus', () => pageJumpInput.select());
      pageJumpInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          jumpToPageInputValue();
          pageJumpInput.blur();
        } else if (event.key === 'Escape') {
          event.preventDefault();
          updatePageJumpDisplay();
          pageJumpInput.blur();
        }
      });
      pageJumpInput.addEventListener('blur', jumpToPageInputValue);
      pageJumpInput.addEventListener('wheel', event => {
        event.preventDefault();
        event.stopPropagation();
      }, { passive: false });
    }
    readerGrid.addEventListener('mousedown', startResize);
    window.addEventListener('mousemove', updateResize);
    window.addEventListener('mouseup', stopResize);
    window.addEventListener('keydown', handleReaderKeydown, { capture: true });
    clearQuoteButton.addEventListener('click', () => {
      currentChatQuote = null;
      renderQuotePreview();
      canvasHint.textContent = '已清除引用';
    });
    canvasInput.addEventListener('keydown', (event) => {
      if (submitInputOnEnter(event, sendCanvasQuestion)) return;
      if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
        event.preventDefault();
        sendCanvasQuestion();
      }
    });
    pageRoot.addEventListener('scroll', scheduleScrollStateSave, { passive: true });
    pageRoot.addEventListener('click', (event) => {
      const button = event.target?.closest?.('[data-bookmark-slide]');
      if (!button) return;
      event.preventDefault();
      event.stopPropagation();
      togglePageBookmark(Number(button.dataset.bookmarkSlide || 0));
    });
    noteRoot.addEventListener('scroll', scheduleScrollStateSave, { passive: true });
    noteRoot.addEventListener('click', (event) => {
      const button = event.target?.closest?.('[data-refresh-page],[data-edit-page],[data-save-edit-page],[data-cancel-edit-page]');
      if (!button) return;
      event.preventDefault();
      event.stopPropagation();
      if (button.dataset.refreshPage) {
        refreshNoteDisplay(Number(button.dataset.refreshPage), button);
      } else if (button.dataset.editPage) {
        startEditExplanation(Number(button.dataset.editPage));
      } else if (button.dataset.saveEditPage) {
        saveEditedExplanation(Number(button.dataset.saveEditPage), button);
      } else if (button.dataset.cancelEditPage) {
        cancelEditExplanation(Number(button.dataset.cancelEditPage));
      }
    });
    noteRoot.addEventListener('keydown', (event) => {
      const editor = event.target?.closest?.('.note-editor');
      if (!editor) return;
      submitInputOnEnter(event, () => saveEditedExplanation(Number(editor.dataset.noteSlide || 0)));
    });
    noteRoot.addEventListener('mouseup', () => window.setTimeout(showSelectionToolbar, 40));
    noteRoot.addEventListener('keyup', () => window.setTimeout(showSelectionToolbar, 40));
    canvasMessages.addEventListener('mouseup', () => window.setTimeout(showSelectionToolbar, 40));
    canvasMessages.addEventListener('keyup', () => window.setTimeout(showSelectionToolbar, 40));
    childChatStack.addEventListener('mouseup', () => window.setTimeout(showSelectionToolbar, 40));
    childChatStack.addEventListener('keyup', () => window.setTimeout(showSelectionToolbar, 40));
    childChatStack.addEventListener('keydown', (event) => {
      const input = event.target?.closest?.('.child-chat-input');
      if (!input) return;
      submitInputOnEnter(event, () => sendChildQuestion(input.dataset.childInput));
    });
    canvasMessages.addEventListener('click', (event) => {
      const button = event.target?.closest?.('[data-open-child-chat]');
      if (!button) return;
      const questionId = Number(button.dataset.openChildChat || 0);
      const item = questionById(questionId);
      if (!item) return;
      openChildChatFromQuote({
        sourceKind: 'question_answer',
        questionId,
        slideNumber: currentSlideNumber,
        selectedText: item.answer || item.question || '',
        selectedTextRaw: item.answer || item.question || '',
        contextBefore: '',
        contextAfter: '',
        depth: Number(item.depth || 0),
      });
    });
    childChatStack.addEventListener('click', (event) => {
      const closeButton = event.target?.closest?.('[data-child-close]');
      if (closeButton) {
        closeChildLayer(closeButton.dataset.childClose);
        return;
      }
      const sendButton = event.target?.closest?.('[data-child-send]');
      if (sendButton) {
        sendChildQuestion(sendButton.dataset.childSend);
        return;
      }
      const bottomButton = event.target?.closest?.('[data-child-bottom]');
      if (bottomButton) {
        scrollChatToBottom(childChatStack.querySelector(`[data-child-messages="${bottomButton.dataset.childBottom}"]`));
      }
    });
    document.addEventListener('mousedown', (event) => {
      if (!selectionToolbar.contains(event.target)) {
        window.setTimeout(() => {
          const selection = window.getSelection();
          if (!selection || selection.isCollapsed) hideSelectionToolbar();
        }, 80);
      }
    });
    document.addEventListener('mousedown', (event) => {
      if (!bookmarkPopover || bookmarkPopover.hidden) return;
      if (bookmarkMenuWrap?.contains?.(event.target)) return;
      closeBookmarkPanel();
    });

    function nearestScrollPanel(target) {
      if (target?.closest?.('.canvas-input')) return null;
      if (target?.closest?.('.child-chat-input')) return null;
      if (target?.closest?.('.page-jump-input')) return null;
      if (target?.closest?.('.note-editor')) return null;
      const element = target?.closest?.('.pages, .notes, .canvas-messages, .child-chat-messages, .bookmark-popover');
      if (element) return element;
      return pageRoot;
    }

    function scrollNoteEditor(event) {
      const editor = event.target?.closest?.('.note-editor');
      if (!editor) return false;
      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation();
      editor.scrollTop += event.deltaY;
      editor.scrollLeft += event.deltaX;
      return true;
    }

    function containedWheelScroll(event) {
      if (scrollNoteEditor(event)) return;
      const panel = nearestScrollPanel(event.target);
      if (!panel) return;
      if (panel === pageRoot && readingMode === 'paged') {
        handlePagedWheel(event);
        return;
      }
      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation();
      panel.scrollBy({ top: event.deltaY, left: event.deltaX, behavior: 'auto' });
    }

    window.addEventListener('wheel', containedWheelScroll, { capture: true, passive: false });
    document.addEventListener('wheel', containedWheelScroll, { capture: true, passive: false });

    if (fullscreenButton) {
      fullscreenButton.addEventListener('click', toggleFullscreen);
    }
    document.addEventListener('fullscreenchange', () => {
      const isFullscreen = Boolean(document.fullscreenElement);
      const exitedFullscreen = lastFullscreenState && !isFullscreen;
      lastFullscreenState = isFullscreen;
      syncFullscreenState(isFullscreen);
      preserveCurrentSlideAfterViewportChange(currentSlideNumber);
      if (exitedFullscreen) {
        scheduleParentReaderCenter({ behavior: 'auto', delay: 180 });
      }
    });
    window.addEventListener('resize', () => {
      if (document.fullscreenElement || document.body.classList.contains('reader-fullscreen')) {
        preserveCurrentSlideAfterViewportChange(currentSlideNumber);
      }
    });

    window.addEventListener('message', (event) => {
      if (event.data?.type !== 'streamlit:render') return;
      renderReader(event.data.args || {});
    });

    Streamlit.setComponentReady();
    Streamlit.setFrameHeight(850);
  </script>
</body>
</html>
