<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
      },
      startup: {
        typeset: false
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <style>
    :root {
      --bg: #f2fbf8;
      --ink: #12323d;
      --muted: #5d7c86;
      --line: #cbe5ea;
      --accent: #18a58f;
      --accent-2: #55b7f4;
      --panel: #ffffff;
      --soft-green: #e9f9f2;
      --soft-blue: #edf8ff;
      --shadow: rgba(17, 89, 105, 0.13);
    }
    * { box-sizing: border-box; }
    html {
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #f5fffb, #eef8ff);
      color: var(--ink);
      font-family: "Microsoft YaHei", "Noto Sans SC", sans-serif;
      overscroll-behavior: none;
    }
    .frame {
      height: 835px;
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: var(--bg);
      box-shadow: 0 18px 45px var(--shadow);
    }
    .topbar {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: rgba(249, 255, 253, 0.96);
      border-bottom: 1px solid var(--line);
    }
    .title {
      font-weight: 800;
      letter-spacing: 0.02em;
    }
    .meta {
      color: var(--muted);
      font-size: 13px;
    }
    .current {
      color: var(--accent);
      font-weight: 800;
    }
    .layout-controls {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-right: 14px;
    }
    .layout-controls button {
      border: 1px solid #b9dde6;
      border-radius: 999px;
      padding: 6px 10px;
      background: #ffffff;
      color: #24606f;
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(24, 111, 130, 0.08);
    }
    .layout-controls button:hover {
      border-color: var(--accent);
      color: #087b70;
      background: var(--soft-green);
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .grid {
      height: calc(100% - 58px);
      display: grid;
      grid-template-columns: minmax(260px, 1.15fr) 8px minmax(300px, 0.85fr) 8px minmax(330px, 0.55fr);
      transition: grid-template-columns .14s ease;
    }
    .resize-handle {
      position: relative;
      width: 8px;
      height: 100%;
      background: linear-gradient(180deg, #dbf3f2, #eaf7ff);
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
      cursor: col-resize;
      z-index: 5;
    }
    .resize-handle::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 3px;
      height: 42px;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      background: #8ccfd0;
      box-shadow: 0 0 0 4px rgba(24, 165, 143, 0.08);
    }
    .resize-handle:hover::after,
    .resize-handle.dragging::after {
      background: var(--accent);
      box-shadow: 0 0 0 5px rgba(24, 165, 143, 0.18);
    }
    .pages, .notes {
      height: 100%;
      overflow-y: auto;
      scroll-behavior: smooth;
      overscroll-behavior: contain;
      touch-action: pan-y;
    }
    .pages {
      padding: 22px 24px 80px;
      background:
        radial-gradient(circle at 10% 10%, rgba(85,183,244,.16), transparent 28%),
        linear-gradient(180deg, #f3fbff, #eefaf6);
    }
    .page {
      margin: 0 auto 30px;
      max-width: 960px;
      padding: 12px;
      border-radius: 14px;
      border: 2px solid transparent;
      background: rgba(255,255,255,.56);
      box-shadow: 0 10px 28px rgba(20,85,98,.13);
      transition: border-color .18s, transform .18s, box-shadow .18s;
    }
    .page.active {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 16px 38px rgba(24,165,143,.22);
    }
    .page-label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 2px 4px 10px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }
    .page img {
      width: 100%;
      display: block;
      border-radius: 8px;
      background: #fff;
    }
    .notes {
      padding: 22px 20px 80px;
      background: var(--panel);
    }
    .note {
      min-height: 260px;
      margin: 0 0 22px;
      padding: 18px 18px 20px;
      border: 1px solid var(--line);
      border-left: 5px solid transparent;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 8px 18px rgba(19,87,101,.08);
      transition: border-color .18s, background .18s;
      line-height: 1.72;
      font-size: 15px;
    }
    .note.active {
      border-left-color: var(--accent);
      background: #effbf7;
    }
    .note h3 {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 18px;
    }
    .note-meta {
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 12px;
    }
    .note-body {
      overflow-wrap: anywhere;
    }
    .note-body h1,
    .note-body h2,
    .note-body h3,
    .note-body h4 {
      margin: 16px 0 8px;
      color: #0f7f78;
      line-height: 1.35;
    }
    .note-body h1 { font-size: 21px; }
    .note-body h2 { font-size: 19px; }
    .note-body h3 { font-size: 17px; }
    .note-body p { margin: 8px 0; }
    .note-body ul,
    .note-body ol {
      margin: 8px 0 10px;
      padding-left: 24px;
    }
    .note-body li { margin: 4px 0; }
    .note-body blockquote {
      margin: 12px 0;
      padding: 8px 12px;
      border-left: 4px solid #68c9ae;
      background: #ecfbf5;
      color: #365967;
    }
    .note-body pre {
      margin: 12px 0;
      padding: 12px;
      overflow-x: auto;
      border-radius: 10px;
      background: #12323d;
      color: #eafffb;
      line-height: 1.55;
    }
    .note-body code {
      padding: 2px 5px;
      border-radius: 5px;
      background: #e7f7f4;
      color: #087b70;
      font-family: "Cascadia Code", "Consolas", monospace;
      font-size: 0.92em;
    }
    .note-body pre code {
      padding: 0;
      background: transparent;
      color: inherit;
    }
    .note-body table {
      width: 100%;
      margin: 12px 0;
      border-collapse: collapse;
      display: block;
      overflow-x: auto;
      font-size: 14px;
    }
    .note-body th,
    .note-body td {
      border: 1px solid #cbe5ea;
      padding: 7px 9px;
      text-align: left;
      vertical-align: top;
    }
    .note-body th {
      background: #e7f7ff;
      color: #155f7a;
    }
    .note-body hr {
      border: 0;
      border-top: 1px solid var(--line);
      margin: 16px 0;
    }
    .note-body mjx-container {
      overflow-x: auto;
      overflow-y: hidden;
      max-width: 100%;
      padding: 2px 0;
    }
    .selection-toolbar {
      position: fixed;
      z-index: 9999;
      display: none;
      align-items: center;
      gap: 8px;
      max-width: min(560px, calc(100vw - 24px));
      padding: 9px 10px;
      border: 1px solid rgba(31, 145, 154, 0.22);
      border-radius: 999px;
      background: rgba(247, 255, 253, 0.98);
      color: var(--ink);
      box-shadow: 0 12px 34px rgba(18, 97, 112, 0.18);
      font-size: 13px;
    }
    .selection-toolbar.show { display: flex; }
    .selection-toolbar button {
      border: 0;
      border-radius: 999px;
      padding: 7px 11px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }
    .selection-toolbar button.secondary {
      background: #e6f6ff;
      color: #1f6b86;
    }
    .selection-toolbar span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #557783;
    }
    .canvas-chat {
      height: 100%;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      background:
        linear-gradient(180deg, rgba(250,255,253,.98), rgba(236,248,255,.98)),
        var(--panel);
      box-shadow: inset 10px 0 28px rgba(24, 119, 140, 0.06);
      overflow: hidden;
    }
    .canvas-chat.collapsed {
      display: flex;
      align-items: stretch;
      justify-content: center;
      background: linear-gradient(180deg, #eaf8ff, #e9fbf3);
    }
    .canvas-chat.collapsed .canvas-chat-header,
    .canvas-chat.collapsed .canvas-context,
    .canvas-chat.collapsed .canvas-messages,
    .canvas-chat.collapsed .canvas-compose {
      display: none;
    }
    .canvas-collapsed-rail {
      display: none;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 12px 6px;
    }
    .canvas-chat.collapsed .canvas-collapsed-rail {
      display: flex;
    }
    .canvas-collapsed-rail button {
      width: 34px;
      min-height: 170px;
      border: 1px solid #a8dce4;
      border-radius: 999px;
      background: #ffffff;
      color: #087b70;
      font-weight: 900;
      cursor: pointer;
      writing-mode: vertical-rl;
      letter-spacing: .08em;
      box-shadow: 0 10px 22px rgba(20, 105, 128, 0.14);
    }
    .canvas-chat-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--line);
    }
    .canvas-chat-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .canvas-chat-title {
      margin: 0;
      color: #087b70;
      font-size: 16px;
      font-weight: 900;
    }
    .canvas-toggle {
      border: 1px solid #b9dde6;
      border-radius: 999px;
      padding: 5px 9px;
      background: #ffffff;
      color: #24606f;
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }
    .canvas-chat-meta {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .canvas-context {
      padding: 10px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(235, 249, 246, 0.86);
      color: #355d68;
      font-size: 13px;
      line-height: 1.5;
    }
    .canvas-messages {
      min-height: 0;
      overflow-y: auto;
      padding: 14px 14px 18px;
      overscroll-behavior: contain;
    }
    .canvas-empty {
      margin: 16px 4px;
      padding: 14px;
      border: 1px dashed #cdb793;
      border-color: #a9d8e5;
      border-radius: 14px;
      color: #5d7c86;
      background: rgba(255,255,255,.48);
      font-size: 13px;
      line-height: 1.65;
    }
    .chat-turn {
      margin-bottom: 14px;
    }
    .chat-question,
    .chat-answer {
      padding: 11px 12px;
      border-radius: 14px;
      line-height: 1.62;
      font-size: 14px;
      overflow-wrap: anywhere;
    }
    .chat-question {
      margin-left: 26px;
      background: linear-gradient(135deg, #18a58f, #43a9e8);
      color: #ffffff;
      border-bottom-right-radius: 5px;
    }
    .chat-answer {
      margin-top: 8px;
      margin-right: 22px;
      border: 1px solid #cbe5ea;
      background: #ffffff;
      color: var(--ink);
      border-bottom-left-radius: 5px;
    }
    .chat-answer h1,
    .chat-answer h2,
    .chat-answer h3,
    .chat-answer h4 {
      margin: 12px 0 6px;
      color: #0f7f78;
      line-height: 1.35;
    }
    .chat-answer p { margin: 7px 0; }
    .chat-answer ul,
    .chat-answer ol {
      margin: 7px 0 9px;
      padding-left: 22px;
    }
    .chat-answer code {
      padding: 2px 5px;
      border-radius: 5px;
      background: #e7f7f4;
      color: #087b70;
      font-family: "Cascadia Code", "Consolas", monospace;
      font-size: 0.92em;
    }
    .chat-turn-meta {
      margin: 6px 2px 0;
      color: #6f8c96;
      font-size: 11px;
    }
    .canvas-compose {
      padding: 12px 14px 14px;
      border-top: 1px solid var(--line);
      background: rgba(250, 255, 253, 0.98);
    }
    .quote-preview {
      display: none;
      margin-bottom: 8px;
      padding: 9px 10px;
      border: 1px solid #a8dce4;
      border-radius: 12px;
      background: #edf8ff;
      color: #1f5d70;
      font-size: 12px;
      line-height: 1.45;
    }
    .quote-preview.show {
      display: block;
    }
    .quote-preview button {
      float: right;
      border: 0;
      background: transparent;
      color: #087b70;
      cursor: pointer;
      font-weight: 900;
    }
    .canvas-input {
      width: 100%;
      min-height: 82px;
      resize: vertical;
      padding: 10px 11px;
      border: 1px solid #b9dde6;
      border-radius: 13px;
      background: #ffffff;
      color: var(--ink);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.55;
      outline: none;
    }
    .canvas-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(24, 165, 143, 0.13);
    }
    .canvas-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 9px;
    }
    .canvas-hint {
      color: var(--muted);
      font-size: 12px;
    }
    .canvas-send {
      border: 0;
      border-radius: 999px;
      padding: 8px 14px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
    }
    .canvas-send:disabled {
      opacity: .56;
      cursor: not-allowed;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr !important; }
      .resize-handle { display: none; }
      .notes,
      .canvas-chat { display: none; }
      .pages { border-right: 0; }
      .layout-controls { display: none; }
    }
  </style>
</head>
<body>
  <div class="frame" id="frame">
    <div class="topbar">
      <div>
        <div class="title" id="deckTitle">学习资料</div>
        <div class="meta" id="deckMeta">未分类 · 原页面同步阅读</div>
      </div>
      <div class="topbar-right">
        <div class="layout-controls" aria-label="阅读器宽度比例">
          <button type="button" data-layout-preset="balanced">均衡</button>
          <button type="button" data-layout-preset="reading">原页优先</button>
          <button type="button" data-layout-preset="notes">讲解优先</button>
          <button type="button" data-layout-preset="chat">插问优先</button>
        </div>
        <div class="current" id="currentPage">第 1 页</div>
      </div>
    </div>
    <div class="grid" id="readerGrid">
      <section class="pages" id="pages"></section>
      <div class="resize-handle" data-resize-handle="pages-notes" title="拖拽调整原页面和讲解区宽度"></div>
      <aside class="notes" id="notes"></aside>
      <div class="resize-handle" data-resize-handle="notes-chat" title="拖拽调整讲解区和插问区宽度"></div>
      <aside class="canvas-chat" id="canvasChat">
        <div class="canvas-collapsed-rail">
          <button type="button" id="openCanvasButton">展开插问</button>
        </div>
        <header class="canvas-chat-header">
          <div class="canvas-chat-header-row">
            <h3 class="canvas-chat-title">侧边插问</h3>
            <button type="button" class="canvas-toggle" id="toggleCanvasButton">收起</button>
          </div>
          <div class="canvas-chat-meta" id="canvasChatMeta">跟随当前页，不改变阅读位置</div>
        </header>
        <div class="canvas-context" id="canvasContext">当前上下文：第 1 页</div>
        <div class="canvas-messages" id="canvasMessages"></div>
        <div class="canvas-compose">
          <div class="quote-preview" id="quotePreview">
            <button type="button" id="clearQuoteButton">×</button>
            <div id="quotePreviewText"></div>
          </div>
          <textarea class="canvas-input" id="canvasInput" placeholder="直接问当前页，例如：这里为什么必须看 ROC？"></textarea>
          <div class="canvas-actions">
            <span class="canvas-hint" id="canvasHint">默认绑定当前可见页</span>
            <button type="button" class="canvas-send" id="canvasSendButton">问当前模型</button>
          </div>
        </div>
      </aside>
    </div>
  </div>
  <div class="selection-toolbar" id="selectionToolbar">
    <button type="button" id="askSelectionButton">引用到插问</button>
    <button type="button" class="secondary" id="copySelectionButton">复制引用</button>
    <span id="selectionHint">将引用选中文本</span>
  </div>
  <script>
    const Streamlit = {
      setComponentReady() {
        window.parent.postMessage({
          isStreamlitMessage: true,
          type: 'streamlit:componentReady',
          apiVersion: 1,
        }, '*');
      },
      setFrameHeight(height) {
        window.parent.postMessage({
          isStreamlitMessage: true,
          type: 'streamlit:setFrameHeight',
          height,
        }, '*');
      },
      setComponentValue(value) {
        window.parent.postMessage({
          isStreamlitMessage: true,
          type: 'streamlit:setComponentValue',
          value,
        }, '*');
      },
    };

    const frame = document.getElementById('frame');
    const readerGrid = document.getElementById('readerGrid');
    const deckTitle = document.getElementById('deckTitle');
    const deckMeta = document.getElementById('deckMeta');
    const pageRoot = document.getElementById('pages');
    const noteRoot = document.getElementById('notes');
    const current = document.getElementById('currentPage');
    const selectionToolbar = document.getElementById('selectionToolbar');
    const askSelectionButton = document.getElementById('askSelectionButton');
    const copySelectionButton = document.getElementById('copySelectionButton');
    const selectionHint = document.getElementById('selectionHint');
    const canvasChat = document.getElementById('canvasChat');
    const toggleCanvasButton = document.getElementById('toggleCanvasButton');
    const openCanvasButton = document.getElementById('openCanvasButton');
    const canvasChatMeta = document.getElementById('canvasChatMeta');
    const canvasContext = document.getElementById('canvasContext');
    const canvasMessages = document.getElementById('canvasMessages');
    const canvasInput = document.getElementById('canvasInput');
    const canvasSendButton = document.getElementById('canvasSendButton');
    const canvasHint = document.getElementById('canvasHint');
    const quotePreview = document.getElementById('quotePreview');
    const quotePreviewText = document.getElementById('quotePreviewText');
    const clearQuoteButton = document.getElementById('clearQuoteButton');

    let pages = [];
    let deckId = 0;
    let activeModel = '';
    let observer = null;
    let currentSelectionPayload = null;
    let currentSlideNumber = 1;
    let currentChatQuote = null;
    let restoreScrollAfterRender = null;
    let layoutState = { pages: 1.15, notes: 0.85, chat: 0.55 };
    let chatCollapsed = false;
    let activeResize = null;

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function renderMarkdown(value) {
      const source = String(value ?? '');
      if (!window.marked || !window.DOMPurify) {
        return escapeHtml(source).replaceAll('\n', '<br>');
      }
      const rawHtml = window.marked.parse(source, {
        gfm: true,
        breaks: true,
      });
      return window.DOMPurify.sanitize(rawHtml, {
        USE_PROFILES: { html: true },
      });
    }

    function typesetMath() {
      if (!window.MathJax?.typesetPromise) {
        window.setTimeout(typesetMath, 120);
        return;
      }
      window.MathJax.typesetPromise([noteRoot, canvasMessages]).catch(error => console.error(error));
    }

    function storageKey(name) {
      return `intp_synced_reader_${deckId}_${name}`;
    }

    function globalStorageKey(name) {
      return `intp_synced_reader_global_${name}`;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function loadLayoutState() {
      try {
        const saved = JSON.parse(localStorage.getItem(globalStorageKey('layout')) || '{}');
        if (Number.isFinite(saved.pages) && Number.isFinite(saved.notes) && Number.isFinite(saved.chat)) {
          layoutState = {
            pages: clamp(saved.pages, 0.35, 3.2),
            notes: clamp(saved.notes, 0.35, 3.2),
            chat: clamp(saved.chat, 0.28, 2.4),
          };
        }
        chatCollapsed = localStorage.getItem(globalStorageKey('chatCollapsed')) === 'true';
      } catch {
        layoutState = { pages: 1.15, notes: 0.85, chat: 0.55 };
        chatCollapsed = false;
      }
      applyLayoutState();
    }

    function saveLayoutState() {
      localStorage.setItem(globalStorageKey('layout'), JSON.stringify(layoutState));
      localStorage.setItem(globalStorageKey('chatCollapsed'), String(chatCollapsed));
    }

    function applyLayoutState() {
      if (!readerGrid) return;
      const chatColumn = chatCollapsed ? '48px' : `minmax(330px, ${layoutState.chat}fr)`;
      readerGrid.style.gridTemplateColumns = `minmax(260px, ${layoutState.pages}fr) 8px minmax(300px, ${layoutState.notes}fr) 8px ${chatColumn}`;
      canvasChat.classList.toggle('collapsed', chatCollapsed);
      if (toggleCanvasButton) toggleCanvasButton.textContent = chatCollapsed ? '展开' : '收起';
    }

    function setLayoutPreset(name) {
      const presets = {
        balanced: { pages: 1, notes: 1, chat: 0.72 },
        reading: { pages: 1.55, notes: 0.82, chat: 0.5 },
        notes: { pages: 0.86, notes: 1.45, chat: 0.56 },
        chat: { pages: 0.85, notes: 0.82, chat: 1.05 },
      };
      layoutState = presets[name] || presets.balanced;
      if (name === 'chat') chatCollapsed = false;
      applyLayoutState();
      saveLayoutState();
    }

    function openCanvasChat(focusInput = false) {
      if (chatCollapsed) {
        chatCollapsed = false;
        applyLayoutState();
        saveLayoutState();
      }
      if (focusInput) {
        window.setTimeout(() => canvasInput?.focus(), 80);
      }
    }

    function toggleCanvasChat() {
      chatCollapsed = !chatCollapsed;
      applyLayoutState();
      saveLayoutState();
    }

    function startResize(event) {
      const handle = event.target.closest('[data-resize-handle]');
      if (!handle) return;
      event.preventDefault();
      activeResize = {
        handle,
        kind: handle.dataset.resizeHandle,
        startX: event.clientX,
        start: { ...layoutState },
      };
      handle.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    }

    function updateResize(event) {
      if (!activeResize) return;
      event.preventDefault();
      const gridWidth = Math.max(1, readerGrid.getBoundingClientRect().width);
      const delta = (event.clientX - activeResize.startX) / gridWidth * 4;
      if (activeResize.kind === 'pages-notes') {
        layoutState.pages = clamp(activeResize.start.pages + delta, 0.35, 3.2);
        layoutState.notes = clamp(activeResize.start.notes - delta, 0.35, 3.2);
      } else {
        layoutState.notes = clamp(activeResize.start.notes + delta, 0.35, 3.2);
        layoutState.chat = clamp(activeResize.start.chat - delta, 0.28, 2.4);
        if (chatCollapsed && delta < -0.02) chatCollapsed = false;
      }
      applyLayoutState();
    }

    function stopResize() {
      if (!activeResize) return;
      activeResize.handle.classList.remove('dragging');
      activeResize = null;
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      saveLayoutState();
    }

    function saveScrollState() {
      if (!deckId) return;
      localStorage.setItem(storageKey('pageScroll'), String(pageRoot.scrollTop));
      localStorage.setItem(storageKey('noteScroll'), String(noteRoot.scrollTop));
      localStorage.setItem(storageKey('currentSlide'), String(currentSlideNumber));
    }

    function readScrollState() {
      if (!deckId) return null;
      return {
        pageScroll: Number(localStorage.getItem(storageKey('pageScroll')) || 0),
        noteScroll: Number(localStorage.getItem(storageKey('noteScroll')) || 0),
        currentSlide: Number(localStorage.getItem(storageKey('currentSlide')) || currentSlideNumber || 1),
      };
    }

    function pageForSlide(slideNumber) {
      return pages.find(item => Number(item.slideNumber) === Number(slideNumber)) || null;
    }

    function setActive(pageNumber) {
      currentSlideNumber = Number(pageNumber || 1);
      document.querySelectorAll('.page.active,.note.active').forEach(el => el.classList.remove('active'));
      const page = document.getElementById(`page-${currentSlideNumber}`);
      const note = document.getElementById(`note-${currentSlideNumber}`);
      if (page) page.classList.add('active');
      if (note) {
        note.classList.add('active');
        noteRoot.scrollTo({ top: note.offsetTop - noteRoot.offsetTop, behavior: 'smooth' });
      }
      current.textContent = `第 ${currentSlideNumber} 页`;
      renderChatForPage(currentSlideNumber);
      saveScrollState();
    }

    function renderReader(args) {
      restoreScrollAfterRender = {
        pageScroll: pageRoot.scrollTop,
        noteScroll: noteRoot.scrollTop,
        currentSlide: currentSlideNumber,
      };
      pages = Array.isArray(args.pages) ? args.pages : [];
      deckId = Number(args.deck_id || 0);
      activeModel = String(args.active_model || '');
      const height = Number(args.height || 850);
      frame.style.height = `${Math.max(360, height - 15)}px`;
      Streamlit.setFrameHeight(height);
      loadLayoutState();

      deckTitle.textContent = String(args.title || '学习资料');
      deckMeta.textContent = `${String(args.subject || '未分类')} · 原页面同步阅读`;
      selectionHint.textContent = `将引用选中文本，并用当前模型：${activeModel || '当前模型'}`;
      canvasChatMeta.textContent = `当前模型：${activeModel || '当前模型'} · 回答保存为对应页插问`;
      if (canvasSendButton.disabled) {
        canvasInput.value = '';
        currentChatQuote = null;
        renderQuotePreview();
        canvasHint.textContent = '回答已保存，可继续围绕当前页追问';
      }
      canvasSendButton.disabled = false;
      canvasSendButton.textContent = '问当前模型';

      if (observer) {
        observer.disconnect();
        observer = null;
      }

      pageRoot.innerHTML = pages.map(page => `
        <article class="page" id="page-${page.slideNumber}" data-page="${page.slideNumber}">
          <div class="page-label">
            <span>第 ${page.slideNumber} 页</span>
            <span>${escapeHtml(page.title)}</span>
          </div>
          <img src="${page.image}" alt="第 ${page.slideNumber} 页原页面" loading="lazy" />
        </article>
      `).join('');

      noteRoot.innerHTML = pages.map(page => `
        <article class="note" id="note-${page.slideNumber}" data-page="${page.slideNumber}">
          <h3>第 ${page.slideNumber} 页讲解</h3>
          <div class="note-meta">${escapeHtml(page.model || '未生成')} ${page.createdAt ? '· ' + escapeHtml(page.createdAt) : ''}</div>
          <div class="note-body">${renderMarkdown(page.explanation)}</div>
        </article>
      `).join('');

      observer = new IntersectionObserver((entries) => {
        const visible = entries
          .filter(entry => entry.isIntersecting)
          .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
        if (!visible) return;
        setActive(visible.target.dataset.page);
      }, {
        root: pageRoot,
        threshold: [0.35, 0.5, 0.65, 0.8],
      });

      document.querySelectorAll('.page').forEach(page => observer.observe(page));
      const stored = readScrollState();
      const targetSlide = stored?.currentSlide || restoreScrollAfterRender?.currentSlide || pages[0]?.slideNumber || 1;
      if (pages.length) setActive(targetSlide);
      window.setTimeout(() => {
        const state = stored || restoreScrollAfterRender;
        if (!state) return;
        pageRoot.scrollTop = state.pageScroll || 0;
        noteRoot.scrollTop = state.noteScroll || 0;
        renderChatForPage(currentSlideNumber);
      }, 80);
      typesetMath();
    }

    function clipText(value, limit) {
      const text = String(value ?? '').replace(/\s+/g, ' ').trim();
      if (text.length <= limit) return text;
      return text.slice(0, limit).trim() + '...';
    }

    function nodeElement(node) {
      if (!node) return null;
      return node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;
    }

    function buildSelectionPayload() {
      const selection = window.getSelection();
      if (!selection || selection.isCollapsed || selection.rangeCount === 0) return null;
      const selectedText = selection.toString().trim();
      if (selectedText.length < 2) return null;

      const range = selection.getRangeAt(0);
      const startElement = nodeElement(range.startContainer);
      const endElement = nodeElement(range.endContainer);
      const note = startElement?.closest?.('.note');
      if (!note || !noteRoot.contains(note) || !endElement || !note.contains(endElement)) return null;

      const noteBody = note.querySelector('.note-body');
      const fullText = noteBody?.innerText || note.innerText || '';
      const normalizedFullText = fullText.replace(/\s+/g, ' ');
      const normalizedSelected = selectedText.replace(/\s+/g, ' ');
      const start = normalizedFullText.indexOf(normalizedSelected);
      const before = start >= 0 ? normalizedFullText.slice(Math.max(0, start - 700), start) : '';
      const after = start >= 0
        ? normalizedFullText.slice(start + normalizedSelected.length, start + normalizedSelected.length + 700)
        : '';
      const slideNumber = Number(note.dataset.page);
      const page = pages.find(item => Number(item.slideNumber) === slideNumber) || {};
      return {
        action: 'branch_quote',
        token: `${Date.now()}_${Math.random().toString(36).slice(2)}`,
        deckId,
        slideNumber,
        slideTitle: page.title || `第 ${slideNumber} 页`,
        selectedText: clipText(selectedText, 1200),
        contextBefore: clipText(before, 700),
        contextAfter: clipText(after, 700),
      };
    }

    function showSelectionToolbar() {
      const payload = buildSelectionPayload();
      if (!payload) {
        hideSelectionToolbar();
        return;
      }
      currentSelectionPayload = payload;
      openCanvasChat(false);
      const selection = window.getSelection();
      const rect = selection.getRangeAt(0).getBoundingClientRect();
      const left = Math.min(Math.max(8, rect.left), Math.max(8, window.innerWidth - 570));
      const top = Math.max(8, rect.top - 52);
      selectionToolbar.style.left = `${left}px`;
      selectionToolbar.style.top = `${top}px`;
      selectionHint.textContent = `第 ${payload.slideNumber} 页：${clipText(payload.selectedText, 42)}`;
      selectionToolbar.classList.add('show');
    }

    function hideSelectionToolbar() {
      currentSelectionPayload = null;
      selectionToolbar.classList.remove('show');
    }

    function quoteTextForClipboard(payload) {
      return [
        `引用自第 ${payload.slideNumber} 页：${payload.slideTitle}`,
        '',
        payload.selectedText,
        '',
        '前文上下文：',
        payload.contextBefore || '无',
        '',
        '后文上下文：',
        payload.contextAfter || '无',
      ].join('\n');
    }

    function renderQuotePreview() {
      if (!currentChatQuote) {
        quotePreview.classList.remove('show');
        quotePreviewText.textContent = '';
        return;
      }
      quotePreviewText.textContent = `已引用第 ${currentChatQuote.slideNumber} 页：${clipText(currentChatQuote.selectedText, 140)}`;
      quotePreview.classList.add('show');
    }

    function renderChatForPage(slideNumber) {
      const page = pageForSlide(slideNumber);
      if (!page) {
        canvasContext.textContent = '当前上下文：未识别页面';
        canvasMessages.innerHTML = '<div class="canvas-empty">还没有可用上下文。</div>';
        return;
      }
      canvasContext.textContent = `当前上下文：第 ${page.slideNumber} 页 · ${page.title || '未命名页面'}`;
      const messages = Array.isArray(page.questions) ? page.questions : [];
      if (!messages.length) {
        canvasMessages.innerHTML = `
          <div class="canvas-empty">
            本页还没有插问。你可以直接围绕当前 PPT 页面和右侧讲解提问；回答会保存到这一页，不会覆盖主线讲解。
          </div>
        `;
        return;
      }
      canvasMessages.innerHTML = messages.map(item => `
        <div class="chat-turn">
          <div class="chat-question">${escapeHtml(item.question || '').replaceAll('\n', '<br>')}</div>
          <div class="chat-answer">${renderMarkdown(item.answer || '')}</div>
          <div class="chat-turn-meta">${escapeHtml(item.model || '未知模型')} ${item.createdAt ? '· ' + escapeHtml(item.createdAt) : ''}</div>
        </div>
      `).join('');
      canvasMessages.scrollTop = canvasMessages.scrollHeight;
      typesetMath();
    }

    function sendCanvasQuestion() {
      const question = canvasInput.value.trim();
      if (!question) {
        canvasHint.textContent = '请先输入问题';
        canvasInput.focus();
        return;
      }
      const page = pageForSlide(currentSlideNumber);
      if (!page) {
        canvasHint.textContent = '当前页上下文不可用';
        return;
      }
      saveScrollState();
      canvasSendButton.disabled = true;
      canvasSendButton.textContent = '发送中...';
      canvasHint.textContent = `正在询问第 ${currentSlideNumber} 页`;
      Streamlit.setComponentValue({
        action: 'canvas_question',
        token: `${Date.now()}_${Math.random().toString(36).slice(2)}`,
        deckId,
        slideNumber: currentSlideNumber,
        question,
        quote: currentChatQuote,
      });
    }

    function sendSelectionToBranch() {
      const payload = currentSelectionPayload || buildSelectionPayload();
      if (!payload) return;
      openCanvasChat(true);
      currentChatQuote = payload;
      renderQuotePreview();
      canvasInput.focus();
      canvasHint.textContent = '已引用选中文本，将随下一次提问发送';
      selectionHint.textContent = '已引用到侧边插问栏';
      selectionToolbar.classList.remove('show');
    }

    function copyCurrentSelection() {
      const payload = currentSelectionPayload || buildSelectionPayload();
      if (!payload) return;
      navigator.clipboard?.writeText(quoteTextForClipboard(payload));
      selectionHint.textContent = '引用内容已复制';
      window.setTimeout(showSelectionToolbar, 800);
    }

    askSelectionButton.addEventListener('mousedown', event => event.preventDefault());
    copySelectionButton.addEventListener('mousedown', event => event.preventDefault());
    askSelectionButton.addEventListener('click', sendSelectionToBranch);
    copySelectionButton.addEventListener('click', copyCurrentSelection);
    canvasSendButton.addEventListener('click', sendCanvasQuestion);
    toggleCanvasButton.addEventListener('click', toggleCanvasChat);
    openCanvasButton.addEventListener('click', () => openCanvasChat(true));
    document.querySelectorAll('[data-layout-preset]').forEach(button => {
      button.addEventListener('click', () => setLayoutPreset(button.dataset.layoutPreset));
    });
    readerGrid.addEventListener('mousedown', startResize);
    window.addEventListener('mousemove', updateResize);
    window.addEventListener('mouseup', stopResize);
    clearQuoteButton.addEventListener('click', () => {
      currentChatQuote = null;
      renderQuotePreview();
      canvasHint.textContent = '已清除引用';
    });
    canvasInput.addEventListener('keydown', (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
        event.preventDefault();
        sendCanvasQuestion();
      }
    });
    pageRoot.addEventListener('scroll', saveScrollState, { passive: true });
    noteRoot.addEventListener('scroll', saveScrollState, { passive: true });
    noteRoot.addEventListener('mouseup', () => window.setTimeout(showSelectionToolbar, 40));
    noteRoot.addEventListener('keyup', () => window.setTimeout(showSelectionToolbar, 40));
    document.addEventListener('mousedown', (event) => {
      if (!selectionToolbar.contains(event.target)) {
        window.setTimeout(() => {
          const selection = window.getSelection();
          if (!selection || selection.isCollapsed) hideSelectionToolbar();
        }, 80);
      }
    });

    function nearestScrollPanel(target) {
      if (target?.closest?.('.canvas-input')) return null;
      const element = target?.closest?.('.pages, .notes, .canvas-messages');
      if (element) return element;
      return pageRoot;
    }

    function containedWheelScroll(event) {
      const panel = nearestScrollPanel(event.target);
      if (!panel) return;
      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation();
      panel.scrollBy({ top: event.deltaY, left: event.deltaX, behavior: 'auto' });
    }

    window.addEventListener('wheel', containedWheelScroll, { capture: true, passive: false });
    document.addEventListener('wheel', containedWheelScroll, { capture: true, passive: false });

    window.addEventListener('message', (event) => {
      if (event.data?.type !== 'streamlit:render') return;
      renderReader(event.data.args || {});
    });

    Streamlit.setComponentReady();
    Streamlit.setFrameHeight(850);
  </script>
</body>
</html>
