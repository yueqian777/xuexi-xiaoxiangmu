<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('复习计划', ~{::section})}">
<section>
    <h1 class="h3 mb-3">复习计划</h1>
    <div class="panel mb-3">
        <h2 class="h5">今日到期</h2>
        <table class="table table-sm">
            <thead><tr><th>日期</th><th>科目</th><th>知识点</th><th>阶段</th><th>掌握度</th><th>结果</th></tr></thead>
            <tbody>
            <tr th:each="task : ${todayTasks}">
                <td th:text="${task.reviewDate}"></td>
                <td th:text="${task.subject}"></td>
                <td th:text="${task.topic}"></td>
                <td th:text="${task.reviewStage}"></td>
                <td th:text="${task.mastery} + '%'"></td>
                <td>
                    <form class="d-flex gap-2" method="post" th:action="@{/reviews/mark}">
                        <input type="hidden" name="taskId" th:value="${task.id}">
                        <select class="form-select form-select-sm" name="result"><option th:each="r : ${reviewResults}" th:text="${r}"></option></select>
                        <button class="btn btn-sm btn-primary">提交</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <div class="panel">
        <h2 class="h5">全部待复习</h2>
        <table class="table table-sm table-hover">
            <thead><tr><th>日期</th><th>科目</th><th>知识点</th><th>阶段</th><th>掌握度</th><th>错因</th></tr></thead>
            <tbody>
            <tr th:each="task : ${pendingTasks}">
                <td th:text="${task.reviewDate}"></td>
                <td th:text="${task.subject}"></td>
                <td th:text="${task.topic}"></td>
                <td th:text="${task.reviewStage}"></td>
                <td th:text="${task.mastery} + '%'"></td>
                <td th:text="${task.lastCause}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</html>
