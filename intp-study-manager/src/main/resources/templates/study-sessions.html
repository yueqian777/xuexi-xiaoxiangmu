<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('学习登记', ~{::section})}">
<section>
    <h1 class="h3 mb-3">学习登记</h1>
    <div class="panel mb-3">
        <form method="post" th:action="@{/study-sessions}" class="row g-3">
            <div class="col-md-3"><label class="form-label">日期</label><input class="form-control" type="date" name="date" th:value="${today}"></div>
            <div class="col-md-3"><label class="form-label">科目</label><input class="form-control" name="subject"></div>
            <div class="col-md-3"><label class="form-label">章节 / PPT</label><input class="form-control" name="chapter"></div>
            <div class="col-md-3"><label class="form-label">今日学习主题</label><input class="form-control" name="title"></div>
            <div class="col-md-6"><label class="form-label">核心问题</label><textarea class="form-control" name="mainQuestion" rows="3"></textarea></div>
            <div class="col-md-6"><label class="form-label">已掌握内容</label><textarea class="form-control" name="masteredContent" rows="3"></textarea></div>
            <div class="col-md-4"><label class="form-label">卡点</label><textarea class="form-control" name="blockers" rows="3"></textarea></div>
            <div class="col-md-4"><label class="form-label">错题或不会的问题</label><textarea class="form-control" name="wrongQuestions" rows="3"></textarea></div>
            <div class="col-md-4"><label class="form-label">主线讲解整理 / 总结</label><textarea class="form-control" name="summary" rows="3"></textarea></div>
            <div class="col-md-3"><label class="form-label">掌握度</label><input class="form-range" type="range" name="mastery" min="0" max="100" value="60"></div>
            <div class="col-md-6 d-flex align-items-end gap-3">
                <label class="form-check"><input class="form-check-input" type="checkbox" name="needReview" checked> 需要复习</label>
                <label class="form-check"><input class="form-check-input" type="checkbox" name="isKey"> 加入重点知识点</label>
                <label class="form-check"><input class="form-check-input" type="checkbox" name="createCard"> 同时创建知识点卡片</label>
            </div>
            <div class="col-md-3 d-flex align-items-end justify-content-end"><button class="btn btn-primary">保存学习记录</button></div>
        </form>
    </div>
    <div class="panel">
        <h2 class="h5">历史学习记录</h2>
        <table class="table table-sm table-hover">
            <thead><tr><th>ID</th><th>日期</th><th>科目</th><th>章节</th><th>主题</th><th>核心问题</th><th>掌握度</th></tr></thead>
            <tbody>
            <tr th:each="record : ${records}">
                <td th:text="${record['id']}"></td>
                <td th:text="${record['date']}"></td>
                <td th:text="${record['subject']}"></td>
                <td th:text="${record['chapter']}"></td>
                <td th:text="${record['title']}"></td>
                <td th:text="${record['main_question']}"></td>
                <td th:text="${record['mastery']} + '%'"></td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</html>
