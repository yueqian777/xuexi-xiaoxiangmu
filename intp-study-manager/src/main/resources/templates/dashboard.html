<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('首页 Dashboard', ~{::section})}">
<section>
    <h1 class="h3 mb-3">首页 Dashboard</h1>
    <div class="row g-3 mb-3">
        <div class="col-md-3"><div class="panel metric"><div class="text-secondary">学习记录</div><div class="display-6" th:text="${studyCount}">0</div></div></div>
        <div class="col-md-3"><div class="panel metric"><div class="text-secondary">知识卡片</div><div class="display-6" th:text="${cardCount}">0</div></div></div>
        <div class="col-md-3"><div class="panel metric"><div class="text-secondary">待复习</div><div class="display-6" th:text="${pendingCount}">0</div></div></div>
        <div class="col-md-3"><div class="panel metric"><div class="text-secondary">资料</div><div class="display-6" th:text="${deckCount}">0</div></div></div>
    </div>
    <div class="row g-3">
        <div class="col-lg-6">
            <div class="panel">
                <h2 class="h5">今日复习</h2>
                <table class="table table-sm">
                    <thead><tr><th>科目</th><th>知识点</th><th>阶段</th><th>掌握度</th></tr></thead>
                    <tbody>
                    <tr th:each="task : ${todayTasks}">
                        <td th:text="${task.subject}"></td>
                        <td th:text="${task.topic}"></td>
                        <td th:text="${task.reviewStage}"></td>
                        <td th:text="${task.mastery} + '%'"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="panel">
                <h2 class="h5">低掌握度知识点</h2>
                <table class="table table-sm">
                    <thead><tr><th>科目</th><th>知识点</th><th>掌握度</th><th>核心问题</th></tr></thead>
                    <tbody>
                    <tr th:each="card : ${lowMasteryCards}">
                        <td th:text="${card.subject}"></td>
                        <td th:text="${card.topic}"></td>
                        <td th:text="${card.mastery} + '%'"></td>
                        <td th:text="${card.coreQuestion}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="panel">
                <h2 class="h5">最近卡点</h2>
                <div th:each="item : ${recentBlockers}" class="border-bottom py-2">
                    <div class="fw-semibold" th:text="|${item.date} · ${item.subject} · ${item.title}|"></div>
                    <div class="text-pre" th:text="${item.blockers}"></div>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="panel">
                <h2 class="h5">未解决问题</h2>
                <div th:each="item : ${parkingQuestions}" class="border-bottom py-2">
                    <span class="badge text-bg-secondary" th:text="${item.subject}"></span>
                    <span th:text="${item.question}"></span>
                </div>
            </div>
        </div>
    </div>
</section>
</html>
