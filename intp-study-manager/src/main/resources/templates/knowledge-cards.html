<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('知识点卡片', ~{::section})}">
<section>
    <h1 class="h3 mb-3">知识点卡片</h1>
    <div class="panel mb-3">
        <form method="post" th:action="@{/knowledge-cards}" class="row g-3">
            <div class="col-md-3"><label class="form-label">科目</label><input class="form-control" name="subject"></div>
            <div class="col-md-3"><label class="form-label">知识点</label><input class="form-control" name="topic"></div>
            <div class="col-md-3"><label class="form-label">掌握度</label><input class="form-control" type="number" min="0" max="100" name="mastery" value="60"></div>
            <div class="col-md-3"><label class="form-label">关联学习记录</label><select class="form-select" name="sourceSessionId"><option value="">不关联</option><option th:each="s : ${sessions}" th:value="${s['id']}" th:text="|${s['date']} · ${s['subject']} · ${s['title']}|"></option></select></div>
            <div class="col-md-6"><label class="form-label">核心问题</label><textarea class="form-control" name="coreQuestion" rows="3"></textarea></div>
            <div class="col-md-6"><label class="form-label">一句话解释</label><textarea class="form-control" name="oneSentence" rows="3"></textarea></div>
            <div class="col-md-6"><label class="form-label">公式 / 逻辑推导</label><textarea class="form-control" name="logicOrFormula" rows="3"></textarea></div>
            <div class="col-md-6"><label class="form-label">典型题 / 应用场景</label><textarea class="form-control" name="application" rows="3"></textarea></div>
            <div class="col-md-6"><label class="form-check"><input class="form-check-input" type="checkbox" name="needReview" checked> 创建 1-3-7-14 复习任务</label></div>
            <div class="col-md-6 text-end"><button class="btn btn-primary">保存知识点卡片</button></div>
        </form>
    </div>
    <div class="row g-3">
        <div class="col-lg-8">
            <div class="panel">
                <h2 class="h5">知识点列表</h2>
                <table class="table table-sm table-hover">
                    <thead><tr><th>ID</th><th>科目</th><th>知识点</th><th>核心问题</th><th>掌握度</th><th>需要复习</th></tr></thead>
                    <tbody>
                    <tr th:each="card : ${cards}">
                        <td th:text="${card['id']}"></td>
                        <td th:text="${card['subject']}"></td>
                        <td th:text="${card['topic']}"></td>
                        <td th:text="${card['core_question']}"></td>
                        <td th:text="${card['mastery']} + '%'"></td>
                        <td th:text="${card['need_review']}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="panel mb-3">
                <h2 class="h5">知识双链</h2>
                <form method="post" th:action="@{/knowledge-links}" class="vstack gap-2">
                    <select class="form-select" name="sourceKnowledgeId"><option th:each="c : ${cards}" th:value="${c['id']}" th:text="|#${c['id']} · ${c['topic']}|"></option></select>
                    <select class="form-select" name="targetKnowledgeId"><option th:each="c : ${cards}" th:value="${c['id']}" th:text="|#${c['id']} · ${c['topic']}|"></option></select>
                    <select class="form-select" name="relationType"><option>前置知识</option><option>相似概念</option><option>对比概念</option><option>容易混淆</option><option>公式迁移</option><option>同一主线</option><option>补充说明</option></select>
                    <textarea class="form-control" name="relationNote" rows="2" placeholder="连接理由"></textarea>
                    <textarea class="form-control" name="comparePoints" rows="2" placeholder="联系 / 对比要点"></textarea>
                    <button class="btn btn-outline-primary">建立知识链接</button>
                </form>
            </div>
            <div class="panel">
                <h2 class="h5">最近链接</h2>
                <div th:each="link : ${links}" class="border-bottom py-2">
                    <div class="fw-semibold" th:text="|${link['source_topic']} -> ${link['target_topic']}|"></div>
                    <span class="badge text-bg-secondary" th:text="${link['relation_type']}"></span>
                    <div class="text-pre small" th:text="${link['compare_points']}"></div>
                </div>
            </div>
        </div>
    </div>
</section>
</html>
