<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('错因本', ~{::section})}">
<section>
    <h1 class="h3 mb-3">错因本</h1>
    <div class="row g-3">
        <div class="col-lg-4">
            <div class="panel">
                <form method="post" th:action="@{/mistakes}" class="vstack gap-2">
                    <input class="form-control" name="subject" placeholder="科目">
                    <input class="form-control" name="topic" placeholder="知识点">
                    <select class="form-select" name="knowledgeId"><option value="">不绑定知识卡片</option><option th:each="c : ${cards}" th:value="${c['id']}" th:text="|#${c['id']} · ${c['subject']} · ${c['topic']}|"></option></select>
                    <textarea class="form-control" name="originalQuestion" rows="3" placeholder="原题"></textarea>
                    <textarea class="form-control" name="myWrongAnswer" rows="2" placeholder="我的错误答案"></textarea>
                    <textarea class="form-control" name="correctIdea" rows="3" placeholder="正确思路"></textarea>
                    <select class="form-select" name="causeCategory"><option th:each="c : ${causeCategories}" th:text="${c}"></option></select>
                    <input class="form-control" name="warningSignal" placeholder="预警信号">
                    <textarea class="form-control" name="summary" rows="2" placeholder="总结"></textarea>
                    <label class="form-check"><input class="form-check-input" type="checkbox" name="addToReview" checked> 加入复习</label>
                    <button class="btn btn-primary">保存错因</button>
                </form>
            </div>
        </div>
        <div class="col-lg-8">
            <div class="panel mb-3">
                <h2 class="h5">错因统计</h2>
                <span th:each="item : ${causeCounts}" class="badge text-bg-secondary me-2" th:text="|${item.causeCategory} · ${item.count}|"></span>
            </div>
            <div class="panel">
                <h2 class="h5">记录</h2>
                <div th:each="m : ${mistakes}" class="border-bottom py-2">
                    <div><span class="badge text-bg-danger" th:text="${m['cause_category']}"></span> <strong th:text="|${m['subject']} · ${m['topic']}|"></strong></div>
                    <div class="text-pre" th:text="${m['original_question']}"></div>
                    <div class="text-pre text-secondary" th:text="${m['summary']}"></div>
                </div>
            </div>
        </div>
    </div>
</section>
</html>
