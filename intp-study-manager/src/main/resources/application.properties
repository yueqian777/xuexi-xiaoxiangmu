spring.application.name=intp-study-manager
server.port=8080

spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=220MB

app.data-dir=data
app.database.path=data/study_manager.db
app.default-model=gpt-5.5

spring.ai.model.chat=none
spring.ai.openai.api-key=${OPENAI_API_KEY:local-disabled}
spring.data.jdbc.repositories.enabled=false
