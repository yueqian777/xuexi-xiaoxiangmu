server:
  port: ${INTP_BACKEND_PORT:8080}

spring:
  application:
    name: intp-study-backend
  datasource:
    url: jdbc:sqlite:${INTP_DB_PATH:study_manager_dev.db}
    driver-class-name: org.sqlite.JDBC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

intp:
  storage:
    root: ${INTP_STORAGE_ROOT:data}
